async function apiCall(params) {
  try {
    const qs = new URLSearchParams(params).toString();
    const r = await fetch(`${API}?${qs}`, { method: "GET", redirect: "follow" });
    return await r.json();
  } catch {
    try {
      const r = await fetch(API, { 
          method: "POST", 
          redirect: "follow", 
          headers: { "Content-Type": "text/plain;charset=utf-8" }, 
          body: JSON.stringify(params) 
      });
      return await r.json();
    } catch (e2) { return { success: false, error: e2.message }; }
  }
}

.toast-ok{background:var(--ok);} .toast-err{background:var(--dn);}

/* =================================================================
   COMPONENTS
================================================================= */

function RichEditor({value,onChange,placeholder}){
  const ref=useRef();
  const exec=(cmd,val)=>{document.execCommand(cmd,false,val);ref.current?.focus()};
  const handleInput=()=>{if(onChange)onChange(ref.current?.innerHTML||"")};
  return(<div className="editor-wrap">
    <div className="editor-toolbar">
      <button type="button" className="editor-btn" onClick={()=>exec("bold")}>{I.bold}</button>
      <button type="button" className="editor-btn" onClick={()=>exec("italic")}>{I.italic}</button>
      <button type="button" className="editor-btn" onClick={()=>exec("underline")}>{I.underline}</button>
    </div>
    <div ref={ref} className="editor-body" contentEditable suppressContentEditableWarning data-placeholder={placeholder||"ระบุรายละเอียด..."} onInput={handleInput} dangerouslySetInnerHTML={{__html:value||""}}/>
  </div>);
}

function RecipientInput({users,selected,onAdd,onRemove}){
  const[q,sQ]=useState("");const[show,sShow]=useState(false);
  const filtered=(users||[]).filter(u=>u.Username?.toLowerCase().includes(q.toLowerCase())&&!selected.includes(u.Username));
  return(<div className="recip-wrap">
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:selected.length?10:0}}>
      {selected.map(s=><span key={s} className="recip-tag">{s}<button onClick={()=>onRemove(s)}>×</button></span>)}
    </div>
    <input className="fi" style={{marginBottom:0}} placeholder="พิมพ์ชื่อผู้รับเพื่อค้นหา..." value={q} onChange={e=>{sQ(e.target.value);sShow(true)}} onFocus={()=>sShow(true)} onBlur={()=>setTimeout(()=>sShow(false),250)}/>
    {show&&q&&filtered.length>0&&<div className="recip-dd">
      {filtered.map(u=><div key={u.Username} className="recip-opt" onMouseDown={e=>{e.preventDefault();onAdd(u.Username);sQ("");sShow(false)}}>
        <div style={{width:32,height:32,borderRadius:'50%',background:"var(--ps)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--p)",fontWeight:700}}>{u.Username[0].toUpperCase()}</div>
        <div><div style={{fontWeight:600}}>{u.Username}</div><div style={{fontSize:12,color:"var(--t3)"}}>{u.Role}</div></div>
      </div>)}
    </div>}
  </div>);
}

function CreateWizard({user,users,onClose,onCreated,showToast}){
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({
    docTypes:["หนังสือภายใน"],urgency:"ปกติ",confidentiality:"ปกติ",
    docNumber:"",subject:"",to:"",content:"",
    files:[], recipients:[], purpose:"เพื่อทราบ", message:""
  });
  const[saving,setSaving]=useState(false);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleType=(t)=>upd("docTypes",form.docTypes.includes(t)?form.docTypes.filter(x=>x!==t):[...form.docTypes,t]);

  const steps=["ตั้งค่าหนังสือ","รายละเอียด","ส่งถึงผู้รับ"];

  const handleSave=async()=>{
    setSaving(true);
    try{
      const d = new Date();
      const thDate = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
      await apiCall({
        action:"createDocument", id:Date.now(), status:"ส่งต่อ", docNumber:form.docNumber,
        subject:form.subject, sender:user.username, date:thDate, purpose:form.purpose,
        to:form.recipients.join(","), content:form.content, type:form.docTypes.join(",")
      });
      showToast("สร้างและส่งหนังสือสำเร็จ");
      onCreated();
    }catch{showToast("เกิดข้อผิดพลาด","err")}
    setSaving(false);
  };

  return(<div className="wiz">
    <div className="page-head" style={{marginBottom:15}}>
      <div><h2 style={{fontSize:22}}>สร้างหนังสือใหม่</h2><p>ระบบสร้างและส่งหนังสือราชการอิเล็กทรอนิกส์</p></div>
    </div>
    
    <div className="wiz-steps">
      {steps.map((s,i)=><>
        <div key={i} className={`wiz-step ${i===step?"active":""} ${i<step?"done":""}`} onClick={()=>{if(i<step)setStep(i)}}>
          <div className="wiz-step-num">{i<step?"✓":i+1}</div>{s}
        </div>
        {i<steps.length-1&&<span style={{color:'var(--bd)'}}>{I.chevR}</span>}
      </>)}
    </div>

    {step===0&&<div className="wiz-card">
      <div className="wiz-title">ตั้งค่ารูปแบบหนังสือ</div>
      <div className="wiz-row">
        <div className="fg full">
          <label>ประเภทหนังสือ *</label>
          {["หนังสือภายใน","หนังสือภายนอก","คำสั่ง/ประกาศ"].map(t=>
            <label key={t} className="fchk"><input type="checkbox" checked={form.docTypes.includes(t)} onChange={()=>toggleType(t)}/>{t}</label>
          )}
        </div>
        <div className="fg">
          <label>ชั้นความเร็ว</label>
          <select className="fi" value={form.urgency} onChange={e=>upd("urgency",e.target.value)}>
            <option>ปกติ</option><option>ด่วน</option><option>ด่วนที่สุด</option>
          </select>
        </div>
        <div className="fg">
          <label>ชั้นความลับ</label>
          <select className="fi" value={form.confidentiality} onChange={e=>upd("confidentiality",e.target.value)}>
            <option>ปกติ</option><option>ลับ</option><option>ลับที่สุด</option>
          </select>
        </div>
      </div>
    </div>}

    {step===1&&<div className="wiz-card">
      <div className="wiz-title">รายละเอียดหนังสือ</div>
      <div className="wiz-row">
        <div className="fg">
          <label>ที่ (เลขที่หนังสือ)</label>
          <input className="fi" placeholder="เช่น อว 8392(14)595" value={form.docNumber} onChange={e=>upd("docNumber",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>เรื่อง *</label>
          <input className="fi" placeholder="ระบุหัวข้อเรื่อง" value={form.subject} onChange={e=>upd("subject",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>เรียน</label>
          <input className="fi" placeholder="ระบุผู้รับ (ตามเอกสาร)" value={form.to} onChange={e=>upd("to",e.target.value)}/>
        </div>
      </div>
      <div className="fg full" style={{marginTop:15}}>
        <label>เนื้อหา / ข้อความ</label>
        <RichEditor value={form.content} onChange={v=>upd("content",v)}/>
      </div>
    </div>}

    {step===2&&<div className="wiz-card">
      <div className="wiz-title">ส่งถึงผู้รับ (ในระบบ)</div>
      <div className="wiz-row">
        <div className="fg full">
          <label>ระบุรายชื่อผู้รับ</label>
          <RecipientInput users={users} selected={form.recipients} onAdd={u=>upd("recipients",[...form.recipients,u])} onRemove={u=>upd("recipients",form.recipients.filter(x=>x!==u))}/>
        </div>
        <div className="fg">
          <label>วัตถุประสงค์การส่ง</label>
          <select className="fi" value={form.purpose} onChange={e=>upd("purpose",e.target.value)}>
            <option>เพื่อทราบ</option><option>เพื่อถือปฏิบัติ</option><option>เพื่อพิจารณา</option>
          </select>
        </div>
      </div>
      <div style={{background:"var(--os)",borderRadius:8,padding:14,fontSize:14,color:"var(--ok)",marginTop:15,fontWeight:500}}>
        ✓ จะส่งแจ้งเตือนผ่านระบบและ LINE ให้ผู้รับจำนวน {form.recipients.length} ท่าน
      </div>
    </div>}

    <div className="wiz-foot">
      <div>{step>0&&<button className="ba" onClick={()=>setStep(step-1)}>{I.back} ย้อนกลับ</button>}</div>
      <div style={{display:"flex",gap:10}}>
        <button className="ba" onClick={onClose}>ยกเลิก</button>
        {step<2?<button className="bn" onClick={()=>setStep(step+1)} disabled={step===1&&!form.subject.trim()}>ขั้นตอนถัดไป {I.chevR}</button>
        :<button className="bn" onClick={handleSave} disabled={saving||form.recipients.length===0}>{saving?"กำลังบันทึก...":"ส่งหนังสือ"}</button>}
      </div>
    </div>
  </div>);
}

/* =================================================================
   MAIN APP
================================================================= */

function App(){
  const[cu,sCu]=useState(()=>{
    const s=sessionStorage.getItem("edoc_user");
    return s?JSON.parse(s):null;
  });
  
  const[pg,sPg]=useState("inbox");
  const[docs,sDocs]=useState([]);
  const[users,sUsers]=useState([]);
  const[ld,sLd]=useState(false);
  const[sel,sSel]=useState(null);
  const[toast,sToast]=useState(null);
  const[sq,sSq]=useState("");
  
  const tt=(m,t="ok")=>{sToast({m,t});setTimeout(()=>sToast(null),3000)};

  const fetchD=useCallback(async()=>{if(!cu)return;sLd(true);
    const r=await apiCall({action:"getDocuments",username:cu.username});
    if(r&&r.success)sDocs(r.data); sLd(false);
  },[cu]);
  
  const fetchU=useCallback(async()=>{if(!cu)return;
    const r=await apiCall({action:"getUsers"});
    if(r&&r.success)sUsers(r.data);
  },[cu]);

  useEffect(()=>{fetchD();fetchU()},[fetchD,fetchU]);

  const[uN,sUN]=useState(""); const[uP,sUP]=useState(""); const[lE,sLE]=useState(""); const[lL,sLL]=useState(false);

  const handleLogin=async()=>{
    if(!uN||!uP)return sLE("กรุณากรอกข้อมูล");
    sLL(true);sLE("");
    const r=await apiCall({action:"login",username:uN,password:uP});
    if(r&&r.success){
      const u={username:r.name,role:r.role};
      sessionStorage.setItem("edoc_user",JSON.stringify(u));sCu(u);
    }else sLE("ข้อมูลไม่ถูกต้อง หรือตรวจสอบ API");
    sLL(false);
  };

  const ack=async(e,d)=>{
    e.stopPropagation();
    try{await apiCall({action:"acknowledge",rowIndex:d.rowIndex,subject:d.Subject,userName:cu.username});tt("รับทราบแล้ว");fetchD();}catch{tt("เกิดข้อผิดพลาด","err")}
  };

  if(!cu)return(<div className="lw"><style>{CSS}</style>
    <div className="lc">
      <img src="school logo.jpg" className="logo-lg" onError={e=>e.target.style.display='none'}/>
      <h2>CMU e-Document</h2>
      <input className="fi" placeholder="ชื่อผู้ใช้งาน" value={uN} onChange={e=>sUN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
      <input className="fi" type="password" placeholder="รหัสผ่าน" value={uP} onChange={e=>sUP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
      <button className="lbt" onClick={handleLogin} disabled={lL}>{lL?"กำลังตรวจสอบ...":"เข้าสู่ระบบ"}</button>
      {lE&&<div className="ler">{lE}</div>}
    </div></div>);

  const isA=cu.role==="สารบัญ";
  const ic=docs.filter(d=>d.Status==="ส่งต่อ").length;
  const fD=docs.filter(d=>{const q=sq.toLowerCase();return !q||(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q)});

  return(<div className="app"><style>{CSS}</style>
    <header className="top">
      <div className="top-l" style={{cursor:'pointer'}} onClick={()=>{sPg("inbox");sSel(null)}}>
        <img src="school logo.jpg" className="logo-sm" onError={e=>e.target.src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23e8eaed'/><text x='50%' y='55%' font-size='20' text-anchor='middle' fill='%235f6368'>L</text></svg>"}/>
        <div className="top-title">CMU e-Document</div>
      </div>
      <div className="top-r">
        <div className="u-info"><div className="u-name">{cu.username}</div><div className="u-role">{cu.role}</div></div>
        <button className="btn-logout" onClick={()=>{sessionStorage.removeItem("edoc_user");window.location.reload()}}>ออกจากระบบ</button>
      </div>
    </header>
    <div className="main-body">
      <aside className="sb">
        <div className="sbn">
          <div className="sbt">เมนูหลัก</div>
          <div className={`sbi ${pg==="inbox"&&!sel?"on":""}`} onClick={()=>{sPg("inbox");sSel(null)}}>{I.inbox} เอกสารเข้า {ic>0&&<span className="badge">{ic}</span>}</div>
          <div className={`sbi ${pg==="outbox"&&!sel?"on":""}`} onClick={()=>{sPg("outbox");sSel(null)}}>{I.send} เอกสารส่งออก</div>
          <div className={`sbi ${pg==="folder"&&!sel?"on":""}`} onClick={()=>{sPg("folder");sSel(null)}}>{I.folder} แฟ้มส่วนตัว</div>
          <div className="sbt" style={{marginTop:20}}>ระบบงาน</div>
          <div className={`sbi ${pg==="search"&&!sel?"on":""}`} onClick={()=>{sPg("search");sSel(null)}}>{I.search} ค้นหาเอกสาร</div>
          <div className={`sbi ${pg==="stats"&&!sel?"on":""}`} onClick={()=>{sPg("stats");sSel(null)}}>{I.chart} สถิติ</div>
        </div>
      </aside>
      <main className="mn">
        {sel?<div className="det"><div className="deth"><button className="detbk" onClick={()=>sSel(null)}>{I.back}</button><div><h2 style={{fontSize:22,color:'var(--p)'}}>{sel.Subject}</h2><div style={{color:'var(--t2)',fontSize:14}}>เลขที่: {sel.DocNumber||"-"}</div></div></div>
        <div className="detc"><div style={{display:'flex',gap:10,marginBottom:20}}><span className="badge-status" style={{background:'var(--ps)',color:'var(--p)'}}>{sel.Status}</span></div><div className="detg"><div><div className="detfl">ผู้ส่ง</div><div className="detfp">{sel.Sender}</div></div><div><div className="detfl">ลงวันที่</div><div className="detfp">{sel.Date}</div></div><div><div className="detfl">วัตถุประสงค์</div><div className="detfp">{sel.Purpose||"-"}</div></div><div><div className="detfl">สถานะรับทราบ</div><div className="detfp" style={{color:sel.ReadBy?'var(--ok)':'var(--t2)'}}>{sel.ReadBy||'ยังไม่ได้อ่าน'}</div></div></div>
        <div style={{marginTop:25,paddingTop:20,borderTop:'1px solid var(--bd)'}}><div className="detfl">เนื้อหา / ข้อความ</div><div className="detcn">{sel.Content||<span style={{color:'var(--t3)'}}>ไม่มีเนื้อหา</span>}</div></div>
        {sel.FileLink&&<div style={{marginTop:20}}><a href={sel.FileLink} target="_blank" className="ba bl" style={{width:'fit-content',textDecoration:'none'}}>{I.file} เปิดดูไฟล์แนบ</a></div>}</div></div>
        
        :pg==="create"?<CreateWizard user={cu} users={users} onClose={()=>sPg("inbox")} onCreated={()=>{sPg("inbox");fetchD()}} showToast={tt}/>
        
        :pg==="inbox"?<div><div className="page-head"><div><h2>รายการเอกสารเข้า</h2><p>คลิกเพื่อดูรายละเอียด หรือกดรับทราบเพื่อยืนยัน</p></div><button className="bn" onClick={()=>sPg("create")}>{I.plus} สร้างหนังสือใหม่</button></div>
        <div className="tc"><div className="tch"><div className="tct">รายการทั้งหมด</div><div className="sbx">{I.search}<input placeholder="ค้นหาเรื่อง, เลขที่..." value={sq} onChange={e=>sSq(e.target.value)}/></div></div>
        {ld?<div className="ldr"><div className="ldrs"/>กำลังโหลด...</div>:fD.length>0?<table className="dt"><thead><tr><th style={{width:'15%'}}>การจัดการ</th><th style={{width:'20%'}}>เลขที่</th><th style={{width:'45%'}}>เรื่อง</th><th style={{width:'20%'}}>ผู้ส่ง</th></tr></thead>
        <tbody>{fD.map((d,i)=>{const isR=d.ReadBy&&d.ReadBy.trim()!=="";return <tr key={i} onClick={()=>sSel(d)}><td onClick={e=>e.stopPropagation()}>{isR?<div className="status-success">{I.check} รับทราบแล้ว</div>:<button className="btn-outline-action" onClick={(e)=>ack(e,d)}>กดรับ<br/>ทราบ</button>}</td><td><div className="dn">{d.DocNumber||"-"}</div><span className="badge-status">{d.Status}</span></td><td><div className="ds">{d.Subject}</div><div className="dm"><span>{I.clock} วันที่: {d.Date}</span><span style={{color:'var(--dn)'}}>{I.pin} {d.Purpose}</span></div></td><td><div style={{fontWeight:500}}>{d.Sender?d.Sender.split('(')[0]:'-'}</div><div style={{fontSize:12,color:'var(--t2)'}}>{d.Sender&&d.Sender.includes('(')?'('+d.Sender.split('(')[1]:''}</div></td></tr>})}</tbody></table>:<div className="emp"><div className="emp-i">📭</div><div className="emp-t">ไม่มีเอกสารเข้าใหม่</div></div>}</div></div>
        
        :pg==="outbox"?<div className="tc"><div className="tch"><div className="tct">เอกสารส่งออก</div><button className="bn" onClick={()=>sPg("create")}>{I.plus} สร้างใหม่</button></div>
        {docs.filter(d=>d.Sender===cu.username).length>0?<table className="dt"><thead><tr><th>เลขที่</th><th>เรื่อง</th><th>วันที่</th><th>สถานะ</th></tr></thead><tbody>{docs.filter(d=>d.Sender===cu.username).map((d,i)=><tr key={i} onClick={()=>sSel(d)}><td><span className="dn">{d.DocNumber||"-"}</span></td><td><div className="ds">{d.Subject}</div></td><td>{d.Date}</td><td><span className="badge-status">{d.Status}</span></td></tr>)}</tbody></table>:<div className="emp"><div className="emp-i">📤</div><div className="emp-t">ยังไม่มีประวัติการส่ง</div></div>}</div>
        
        :pg==="search"?<div className="tc"><div style={{padding:20}}><div className="sbx" style={{background:'#fff',border:'1px solid var(--bd)'}}>{I.search}<input placeholder="พิมพ์คำค้นหา..." value={sq} onChange={e=>sSq(e.target.value)} style={{fontSize:15}}/></div></div>
        {sq.trim()?<table className="dt"><thead><tr><th>เลขที่</th><th>เรื่อง</th><th>ผู้ส่ง</th><th>วันที่</th></tr></thead><tbody>{docs.filter(d=>{const q=sq.toLowerCase();return(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q)||(d.Sender||"").toLowerCase().includes(q)}).map((d,i)=><tr key={i} onClick={()=>sSel(d)}><td><span className="dn">{d.DocNumber||"-"}</span></td><td><div className="ds" style={{fontSize:15}}>{d.Subject}</div></td><td style={{fontSize:13}}>{d.Sender}</td><td style={{fontSize:13}}>{d.Date}</td></tr>)}</tbody></table>:<div className="emp"><div className="emp-i">🔍</div><div className="emp-t">ค้นหาเอกสารทั้งหมดในระบบ</div></div>}</div>
        
        :<div className="emp"><div className="emp-i">🚧</div><div className="emp-t" style={{color:'var(--p)',fontSize:20,marginBottom:10}}>ฟังก์ชันนี้กำลังอยู่ระหว่างการพัฒนา</div><p>ระบบจะเปิดให้ใช้งานในเร็วๆ นี้</p></div>}
      </main>
    </div>
    {toast&&<div className={`toast toast-${toast.t}`}>{toast.t==="ok"?I.check:"⚠"} {toast.m}</div>}
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
