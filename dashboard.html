async function apiCall(params) {
  try {
    const qs = new URLSearchParams(params).toString();
    const r = await fetch(`${API}?${qs}`, { method: "GET", redirect: "follow" });
    return await r.json();
  } catch {
    try {
      const r = await fetch(API, { 
          method: "POST", redirect: "follow", 
          headers: { "Content-Type": "text/plain;charset=utf-8" }, 
          body: JSON.stringify(params) 
      });
      return await r.json();
    } catch (e2) { return { success: false, error: e2.message }; }
  }
}

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
:root{
  --f:'Sarabun',sans-serif;
  --p:#1c3b82;--ph:#152d65;--ps:#e8f0fe;
  --ac:#f59e0b;--as:#fffbeb;--dn:#d93025;--ds:#fce8e6;--ok:#188038;--os:#ceead6;

  --sh:0 1px 4px rgba(0,0,0,.07);--r:10px;--rl:14px;--rx:18px
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body,html,#root{height:100%;font-family:var(--f);background:var(--bg);color:var(--t);overflow:hidden;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.fi{width:100%;padding:12px 14px;border:1px solid var(--bd);border-radius:8px;font-size:15px;font-family:var(--f);background:#f8f9fa;transition:0.2s;margin-bottom:15px;outline:none;}
.fi:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(28,59,130,.1);}

/* APP LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.top{height:75px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 30px;flex-shrink:0;z-index:10;}
.top-l{display:flex;align-items:center;gap:15px;}
.logo-sm{width:46px;height:46px;border-radius:50%;object-fit:cover;border:1px solid var(--bd);}
.top-title{font-size:18px;font-weight:700;color:var(--p); letter-spacing: -0.3px;}
.top-sub{font-size:13px;color:var(--t2);margin-top:-2px; font-weight: 500;}

.top-r{display:flex;align-items:center;gap:20px;}
.u-info{text-align:right;line-height:1.2;}
.u-name{font-weight:600;font-size:15px;color:var(--p);}
.u-role{font-size:12px;color:var(--t2);}
.btn-logout{background:#f1f3f4;border:none;padding:8px 16px;border-radius:20px;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:0.2s;font-family:var(--f);}
.btn-logout:hover{background:#e0e0e0;color:var(--t);}

.main-body{flex:1;display:flex;overflow:hidden;}

/* SIDEBAR */
.sb{width:260px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;}
.sbn{flex:1;padding:20px 15px;overflow-y:auto;}
.sbt{font-size:12px;text-transform:uppercase;color:var(--t2);font-weight:600;padding:0 10px 10px;margin-top:10px;}
.sbi{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:15px;color:var(--t);font-weight:500;margin-bottom:4px;}
.sbi:hover{background:var(--ps);color:var(--p);}
.sbi.on{background:var(--ps);color:var(--p);font-weight:600;}
.sbbg{margin-left:auto;font-size:12px;font-weight:700;background:var(--dn);color:#fff;padding:2px 8px;border-radius:12px;}

/* CONTENT */
.mn{flex:1;overflow-y:auto;background:var(--bg);padding:30px 40px;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:25px;}
.page-head h2{font-size:24px;font-weight:700;color:var(--t);margin-bottom:4px;}
.page-head p{color:var(--t2);font-size:14px;}

.bn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--f);box-shadow:0 2px 4px rgba(0,0,0,.1);}
.bn:hover{background:var(--ph);transform:translateY(-1px);}
.bn:disabled{opacity:.6;cursor:wait;transform:none;}

.ba{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#f1f3f4;color:var(--t2);border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--f);}
.ba:hover{background:#e0e0e0;color:var(--t);}

/* TABLE CARD */
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;animation:fadeUp .4s backwards;}
.tch{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--bd);background:#fff;}
.tct{font-size:16px;font-weight:700;color:var(--t);}
.sbx{display:flex;align-items:center;gap:7px;background:var(--bg);border-radius:8px;padding:8px 12px;border:1px solid transparent;transition:all .2s;}
.sbx:focus-within{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(28,59,130,.1);}
.sbx input{border:none;background:none;font-size:14px;font-family:var(--f);outline:none;flex:1;}

table.dt{width:100%;border-collapse:collapse;text-align:left;}
table.dt th{padding:14px 20px;font-size:14px;font-weight:600;color:var(--t2);background:#f8fafc;border-bottom:1px solid var(--bd);}
table.dt td{padding:18px 20px;border-bottom:1px solid var(--bd);font-size:14px;vertical-align:top;}
table.dt tbody tr{transition:all .15s;cursor:pointer;}
table.dt tbody tr:hover{background:#f8fafc;}

.ds{font-weight:600;color:var(--p);font-size:16px;margin-bottom:6px;display:block;}
.dm{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:10px;}
.dn{font-size:16px;color:var(--t);font-weight:600;}
.badge-status{display:inline-block;background:#f1f3f4;color:var(--t2);padding:2px 10px;border-radius:12px;font-size:12px;margin-top:6px;font-weight:500;}

.status-success{color:var(--ok);font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;background:var(--os);padding:6px 12px;border-radius:20px;width:fit-content;}
.status-wait{color:#d97706;font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;background:#fffbeb;padding:6px 12px;border-radius:20px;width:fit-content;}
.status-recalled{color:var(--dn);font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;background:var(--ds);padding:6px 12px;border-radius:20px;width:fit-content;}

.emp{text-align:center;padding:60px 20px;color:var(--t2);}
.emp-i{font-size:48px;margin-bottom:15px;opacity:.5;}
.emp-t{font-size:16px;font-weight:600;}

/* DETAIL PAGE */
.det{animation:slideL .3s;}
.deth{display:flex;align-items:center;gap:15px;margin-bottom:20px;}
.detbk{width:40px;height:40px;border-radius:8px;border:1px solid var(--bd);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--t2);}
.detbk:hover{background:var(--ps);color:var(--p);border-color:var(--p);}
.detc{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:30px;}
.detg{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
.detfl{font-size:13px;color:var(--t2);font-weight:600;margin-bottom:4px;}
.detfp{font-size:15px;font-weight:500;color:var(--t);}
.detcn{background:#f8fafc;border:1px solid var(--bd);border-radius:8px;padding:20px;line-height:1.6;font-size:14px;margin-top:10px;}

.action-bar{margin-top:30px;padding-top:20px;border-top:1px solid var(--bd);display:flex;gap:10px;flex-wrap:wrap;}
.btn-ack{background:var(--ok);color:white;} .btn-ack:hover{background:#146c2e;}
.btn-fwd{background:var(--p);color:white;} .btn-fwd:hover{background:var(--ph);}
.btn-rep{background:#64748b;color:white;} .btn-rep:hover{background:#475569;}
.btn-recall{background:var(--dn);color:white;} .btn-recall:hover{background:#b71c1c;}

/* Routing History Styles */
.rt-box { background: #fff; border: 1px solid var(--bd); border-radius: 8px; margin-top: 12px; overflow: hidden; }
.rt-head { background: #f8fafc; padding: 12px 16px; border-bottom: 1px solid var(--bd); font-size: 13px; color: var(--t2); display: flex; align-items: center; gap: 8px; flex-wrap: wrap;}
.rt-body { padding: 16px; font-size: 14px; line-height: 1.6; }

/* WIZARD */
.wiz{animation:fadeUp .3s;}
.wiz-steps{display:flex;align-items:center;margin-bottom:24px;background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:15px 25px;gap:8px;flex-wrap:wrap;}
.wiz-step{display:flex;align-items:center;gap:10px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;color:var(--t3);cursor:pointer;transition:all .2s;}
.wiz-step.active{background:var(--ps);color:var(--p);font-weight:600;}
.wiz-step.done{color:var(--ok);font-weight:600;}
.wiz-step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--bd);}
.wiz-step.active .wiz-step-num{border-color:var(--p);background:var(--p);color:#fff;}
.wiz-step.done .wiz-step-num{border-color:var(--ok);background:var(--os);color:var(--ok);}
.wiz-card{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:30px;animation:fadeUp .3s;}
.wiz-title{font-size:18px;font-weight:700;color:var(--t);margin-bottom:25px;padding-bottom:15px;border-bottom:2px solid var(--bd);}
.wiz-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.fg{margin-bottom:15px;} .fg.full{grid-column:1/-1;}
.fg>label{display:block;font-size:14px;font-weight:600;color:var(--t2);margin-bottom:8px;}
.fchk{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:15px;cursor:pointer;}
.fchk input{width:18px;height:18px;accent-color:var(--p);}

/* EDITOR */
.editor-wrap{border:1px solid var(--bd);border-radius:8px;overflow:hidden;background:#fff;}
.editor-toolbar{display:flex;gap:4px;padding:8px 10px;background:#f8fafc;border-bottom:1px solid var(--bd);}
.editor-btn{width:32px;height:32px;border:none;background:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .15s;}
.editor-btn:hover{background:var(--ps);color:var(--p);}
.editor-body{min-height:200px;padding:15px;font-size:15px;line-height:1.6;outline:none;}
.editor-body:empty::before{content:attr(data-placeholder);color:var(--t3);}

/* RECIPIENT */
.recip-wrap{position:relative;}
.recip-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--bd);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:50;max-height:200px;overflow-y:auto;}
.recip-opt{padding:12px 15px;cursor:pointer;font-size:14px;transition:all .1s;display:flex;align-items:center;gap:10px;}
.recip-opt:hover{background:var(--ps);color:var(--p);}
.recip-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--ps);color:var(--p);border-radius:20px;font-size:13px;font-weight:500;margin:4px;}
.recip-tag button{background:none;border:none;color:var(--p);cursor:pointer;font-size:16px;}

.wiz-foot{display:flex;justify-content:space-between;margin-top:25px;padding-top:20px;border-top:1px solid var(--bd);}

/* TOAST */
.toast{position:fixed;bottom:30px;right:30px;padding:14px 24px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;animation:slideUp .3s;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:#fff;}

/* =================================================================
   JSON PURPOSE PARSER
================================================================= */
const getMyPurpose = (purposeStr, me) => {
  if(!purposeStr) return "-";
  try {
    const pObj = JSON.parse(purposeStr);
    return pObj[me] || "เพื่อทราบ";
  } catch {
    return purposeStr; 
  }
};

const getAllPurposes = (purposeStr) => {
  if(!purposeStr) return "-";
  try {
    const pObj = JSON.parse(purposeStr);
    return Object.entries(pObj).map(([name, purp]) => `${name} (${purp})`).join(", ");
  } catch {
    return purposeStr;
  }
};

const renderRoutingHistory = (histStr) => {
  if (!histStr || histStr === "[]") return <div style={{color:'var(--t3)', marginTop: 10, fontSize: 13}}>ยังไม่มีประวัติการส่งต่อหรือเกษียณหนังสือ</div>;
  try {
      const hist = JSON.parse(histStr);
      return hist.map((h, i) => (
          <div className="rt-box" key={i}>
              <div className="rt-head">
                  <span style={{background: h.type === 'recall' ? '#d93025' : '#f59e0b', color: '#fff', padding: '2px 6px', borderRadius: 10, fontSize: 11, fontWeight: 700}}>
                    {h.type === 'recall' ? 'ดึงคืน' : 'FW'}
                  </span>
                  {h.type === 'recall' 
                    ? <><b>{h.from}</b> ดึงหนังสือคืนจาก <b>{(h.to || "").split(',').join(', ')}</b></>
                    : <>จาก <b>{h.from}</b> ถึง <b>{(h.to || "").split(',').join(', ')}</b></>
                  }
                  <span style={{marginLeft: 'auto'}}>{I.clock} {h.date}</span>
              </div>
              <div className="rt-body" dangerouslySetInnerHTML={{__html: h.comment || '<span style="color:var(--t3)">ไม่มีข้อความเพิ่มเติม</span>'}} />
          </div>
      ));
  } catch(e) { return <div style={{color:'var(--t3)'}}>ไม่สามารถอ่านประวัติได้</div>; }
};

function RichEditor({value, onChange, placeholder}) {
  const editorRef = useRef(null);

  useEffect(() => {
    if (editorRef.current && value !== editorRef.current.innerHTML) {
      editorRef.current.innerHTML = value || "";
    }
  }, [value]);

  const exec = (cmd, val) => {
    document.execCommand(cmd, false, val);
    editorRef.current?.focus();
    if (onChange && editorRef.current) onChange(editorRef.current.innerHTML);
  };

  const handleInput = () => {
    if (onChange && editorRef.current) {
      onChange(editorRef.current.innerHTML);
    }
  };

  return (
    <div className="editor-wrap">
      <div className="editor-toolbar">
        <button type="button" className="editor-btn" onClick={()=>exec("bold")} title="ตัวหนา">{I.bold}</button>
        <button type="button" className="editor-btn" onClick={()=>exec("italic")} title="ตัวเอียง">{I.italic}</button>
        <button type="button" className="editor-btn" onClick={()=>exec("underline")} title="ขีดเส้นใต้">{I.underline}</button>
      </div>
      <div 
        ref={editorRef} 
        className="editor-body" 
        contentEditable 
        suppressContentEditableWarning 
        data-placeholder={placeholder || "ระบุรายละเอียดเนื้อหา..."} 
        onInput={handleInput}
        onBlur={handleInput}
      />
    </div>
  );
}

function RecipientInput({users,selected,onAdd,onRemove}){
  const[q,sQ]=useState("");const[show,sShow]=useState(false);
  
  const filtered=(users||[]).filter(u=>{
    const searchStr = `${u.FullName || u.Username} ${u.Position || ''}`.toLowerCase();
    return searchStr.includes(q.toLowerCase()) && !selected.includes(u.FullName || u.Username);
  });
  
  return(<div className="recip-wrap">
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:selected.length?10:0}}>
      {selected.map(s=><span key={s} className="recip-tag">{s}<button onClick={()=>onRemove(s)}>×</button></span>)}
    </div>
    <input className="fi" style={{marginBottom:0}} placeholder="พิมพ์ชื่อ หรือ ตำแหน่ง เพื่อค้นหา..." value={q} onChange={e=>{sQ(e.target.value);sShow(true)}} onFocus={()=>sShow(true)} onBlur={()=>setTimeout(()=>sShow(false),250)}/>
    {show&&q&&filtered.length>0&&<div className="recip-dd">
      {filtered.map(u=><div key={u.Username} className="recip-opt" onMouseDown={e=>{e.preventDefault();onAdd(u.FullName || u.Username);sQ("");sShow(false)}}>
        <div style={{width:32,height:32,borderRadius:'50%',background:"var(--ps)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--p)",fontWeight:700}}>
          {(u.FullName || u.Username)[0].toUpperCase()}
        </div>
        <div>
           <div style={{fontWeight:600}}>{u.FullName || u.Username}</div>
           <div style={{fontSize:12,color:"var(--t3)"}}>
             {u.Position || u.Role} {u.Email ? `• ${u.Email}` : ''}
           </div>
        </div>
      </div>)}
    </div>}
  </div>);
}

function ConfirmModal({open, onClose, onConfirm, title, message, icon, iconType, confirmText, confirmStyle, loading}) {
  if(!open) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className={`modal-icon ${iconType||'info'}`}>{icon}</div>
          <div>
            <div style={{fontSize:18,fontWeight:700,color:'var(--t)'}}>{title}</div>
          </div>
        </div>
        <div className="modal-body"><p>{message}</p></div>
        <div className="modal-foot">
          <button className="ba" onClick={onClose} disabled={loading}>ยกเลิก</button>
          <button className="bn" style={confirmStyle} onClick={onConfirm} disabled={loading}>
            {loading ? "กำลังดำเนินการ..." : confirmText}
          </button>
        </div>
      </div>
    </div>
  );
}


/* =================================================================
   ENHANCED FORWARD WIZARD - ส่งต่อเอกสารแบบสมบูรณ์
================================================================= */
function ForwardWizard({user, users, doc, onClose, onForwarded, showToast, isReply}) {
  const [step, setStep] = useState(0); // 0=เลือกผู้รับ, 1=กำหนดวัตถุประสงค์, 2=ยืนยันส่ง
  const [form, setForm] = useState({
      recipients: isReply ? [doc.Sender] : [],
      purposes: isReply ? {[doc.Sender]: "เพื่อทราบ"} : {},
      comment: ""
  });
  const [saving, setSaving] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const upd = (k,v) => setForm(f => ({...f, [k]: v}));

  const steps = isReply 
    ? ["เลือกผู้รับ", "วัตถุประสงค์และข้อความ", "ตรวจสอบและส่ง"]
    : ["เลือกผู้รับ", "กำหนดวัตถุประสงค์", "ข้อความเกษียณ + ยืนยัน"];

  const handleSave = async () => {
      setSaving(true);
      try {
          await apiCall({
              action: "forwardDocument", 
              rowIndex: doc.rowIndex, 
              subject: doc.Subject, 
              sender: user.name || user.username, 
              to: form.recipients.join(","), 
              purpose: JSON.stringify(form.purposes), 
              comment: form.comment
          });
          showToast("เกษียณและส่งต่อเอกสารสำเร็จ");
          onForwarded();
      } catch { showToast("เกิดข้อผิดพลาดในการส่งต่อ", "err"); }
      setSaving(false);
      setShowConfirm(false);
  };

  const getUserInfo = (name) => {
    const u = (users||[]).find(u => (u.FullName||u.Username) === name);
    return u || {FullName: name, Position: '', Username: name};
  };

  return (
    <div className="wiz">
      <div className="page-head" style={{marginBottom:15}}>
        <div>
          <h2 style={{fontSize:22}}>{isReply ? "ตอบกลับเอกสาร" : "เกษียณและส่งต่อเอกสาร"}</h2>
          <p>เรื่อง: {doc.Subject} | เลขที่: {doc.DocNumber || '-'}</p>
        </div>
      </div>

      <div className="wiz-steps">
        {steps.map((s,i)=><React.Fragment key={i}>
          <div className={`wiz-step ${i===step?"active":""} ${i<step?"done":""}`} onClick={()=>{if(i<step)setStep(i)}}>
            <div className="wiz-step-num">{i<step?"✓":i+1}</div>{s}
          </div>
          {i<steps.length-1&&<span style={{color:'var(--bd)'}} key={i+'_arr'}>{I.chevR}</span>}
        </React.Fragment>)}
      </div>

      {/* STEP 0: เลือกผู้รับ */}
      {step===0 && <div className="wiz-card">
        <div className="wiz-title" style={{display:'flex',alignItems:'center',gap:10}}>
          {I.users} เลือกผู้รับเอกสาร
        </div>
        <div className="fg full">
          <label>ค้นหาและเลือกรายชื่อผู้รับ (เลือกได้หลายท่าน)</label>
          <RecipientInput users={users} selected={form.recipients} 
            onAdd={u=>{
              if(!form.recipients.includes(u)){
                upd("recipients",[...form.recipients,u]);
                upd("purposes",{...form.purposes, [u]:"เพื่อทราบ"});
              }
            }} 
            onRemove={u=>{
              const nR = form.recipients.filter(x=>x!==u);
              const nP = {...form.purposes}; delete nP[u];
              upd("recipients",nR); upd("purposes",nP);
            }}
          />
        </div>
        {form.recipients.length > 0 && (
          <div style={{background:'var(--os)',borderRadius:8,padding:14,fontSize:14,color:'var(--ok)',fontWeight:500,marginTop:10}}>
            ✓ เลือกผู้รับแล้ว {form.recipients.length} ท่าน
          </div>
        )}
      </div>}

      {/* STEP 1: กำหนดวัตถุประสงค์ */}
      {step===1 && <div className="wiz-card">
        <div className="wiz-title" style={{display:'flex',alignItems:'center',gap:10}}>
          {I.stamp} กำหนดวัตถุประสงค์รายบุคคล
        </div>
        <p style={{color:'var(--t2)',fontSize:14,marginBottom:20}}>
          กำหนดวัตถุประสงค์ให้แต่ละท่าน — เช่น เพื่อทราบ, เพื่อพิจารณา, เพื่ออนุมัติ ฯลฯ จากนั้นกดถัดไป
        </p>

        {form.recipients.map(r => {
          const uInfo = getUserInfo(r);
          const purp = form.purposes[r] || "เพื่อทราบ";
          const pc = PURPOSE_COLORS[purp] || {bg:'#f1f3f4',color:'var(--t2)'};
          return (
            <div className="fwd-recipient-card" key={r}>
              <div className="fwd-avatar" style={{background:pc.bg,color:pc.color}}>
                {r[0].toUpperCase()}
              </div>
              <div>
                <div className="fwd-name">{r}</div>
                <div className="fwd-pos">{uInfo.Position || uInfo.Role || ''}</div>
              </div>
              <select className="fwd-purpose-select" value={purp} onChange={e => upd("purposes", {...form.purposes, [r]: e.target.value})}>
                {PURPOSE_OPTIONS.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>
          );
        })}

        {!isReply && (
          <div className="fg full" style={{marginTop:20}}>
            <label>ข้อความเกษียณหนังสือ (ถ้ามี)</label>
            <RichEditor value={form.comment} onChange={v=>upd("comment",v)} placeholder="พิมพ์ความเห็น คำสั่งการ หรือข้อเสนอแนะที่นี่..."/>
          </div>
        )}

        {isReply && (
          <div className="fg full" style={{marginTop:20}}>
            <label>ข้อความตอบกลับ</label>
            <RichEditor value={form.comment} onChange={v=>upd("comment",v)} placeholder="พิมพ์ข้อความตอบกลับที่นี่..."/>
          </div>
        )}
      </div>}

      {/* STEP 2: ยืนยันก่อนส่ง */}
      {step===2 && <div className="wiz-card">
        <div className="wiz-title" style={{display:'flex',alignItems:'center',gap:10}}>
          {I.eye} ตรวจสอบรายละเอียดก่อนส่ง
        </div>

        <div className="summary-card">
          <div className="summary-title">{I.forward} สรุปการส่งต่อเอกสาร</div>
          
          <div style={{marginBottom:12}}>
            <div style={{fontSize:13,color:'var(--t2)',marginBottom:4}}>เรื่อง</div>
            <div style={{fontSize:16,fontWeight:700,color:'var(--p)'}}>{doc.Subject}</div>
          </div>

          <div style={{fontSize:13,color:'var(--t2)',marginBottom:8,marginTop:16}}>ผู้รับ และ วัตถุประสงค์</div>
          {form.recipients.map(r => {
            const purp = form.purposes[r] || "เพื่อทราบ";
            const pc = PURPOSE_COLORS[purp] || {bg:'#f1f3f4',color:'var(--t2)'};
            return (
              <div className="summary-item" key={r}>
                <div style={{width:32,height:32,borderRadius:'50%',background:pc.bg,color:pc.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,flexShrink:0}}>
                  {r[0].toUpperCase()}
                </div>
                <div style={{flex:1,fontWeight:600,fontSize:14}}>{r}</div>
                <span className="summary-badge" style={{background:pc.bg,color:pc.color}}>{purp}</span>
              </div>
            );
          })}

          {form.comment && (
            <div style={{marginTop:16}}>
              <div style={{fontSize:13,color:'var(--t2)',marginBottom:6}}>ข้อความเกษียณ</div>
              <div style={{background:'#fff',borderRadius:8,padding:12,fontSize:14,lineHeight:1.6,border:'1px solid rgba(200,214,240,.5)'}} dangerouslySetInnerHTML={{__html:form.comment}} />
            </div>
          )}
        </div>

        <div style={{background:'var(--as)',borderRadius:8,padding:14,fontSize:14,color:'#92400e',marginTop:16,fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
          {I.warn} กรุณาตรวจสอบรายชื่อผู้รับและวัตถุประสงค์ให้ถูกต้องก่อนกดส่ง — ระบบจะแจ้งเตือนผ่าน Email อัตโนมัติ
        </div>
      </div>}

      <div className="wiz-foot">
        <div style={{display:'flex',gap:10}}>
          {step>0&&<button className="ba" onClick={()=>setStep(step-1)}>{I.back} ย้อนกลับ</button>}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="ba" onClick={onClose}>ยกเลิก</button>
          {step<2
            ? <button className="bn" onClick={()=>setStep(step+1)} disabled={form.recipients.length===0}>
                ขั้นตอนถัดไป {I.chevR}
              </button>
            : <button className="bn btn-ack" onClick={()=>setShowConfirm(true)} disabled={saving||form.recipients.length===0}>
                {I.send} ยืนยันส่งเอกสาร ({form.recipients.length} ท่าน)
              </button>
          }
        </div>
      </div>

      <ConfirmModal
        open={showConfirm}
        onClose={()=>setShowConfirm(false)}
        onConfirm={handleSave}
        title="ยืนยันการส่งเอกสาร"
        message={`คุณต้องการส่งเอกสาร "${doc.Subject}" ไปยังผู้รับจำนวน ${form.recipients.length} ท่านใช่หรือไม่? ระบบจะส่งการแจ้งเตือนทาง Email ไปยังทุกท่านอัตโนมัติ`}
        icon={I.send}
        iconType="success"
        confirmText="ส่งเอกสาร"
        confirmStyle={{background:'var(--ok)'}}
        loading={saving}
      />
    </div>
  );
}


/* =================================================================
   CREATE WIZARD
================================================================= */
function CreateWizard({user,users,onClose,onCreated,showToast}){
  const[step,setStep]=useState(0);
  
  const[form,setForm]=useState({
    docTypes: ["หนังสือภายใน"], urgency: "ปกติ", confidentiality: "ปกติ", docNumber: "", subject: "", to: "", content: "", recipients: [], purposes: {} 
  });
  
  const[saving,setSaving]=useState(false);
  const[showConfirm,setShowConfirm]=useState(false);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleType=(t)=>upd("docTypes",form.docTypes.includes(t)?form.docTypes.filter(x=>x!==t):[...form.docTypes,t]);

  const steps=["ตั้งค่าหนังสือ","รายละเอียด","เลือกผู้รับ","ตรวจสอบ + ส่ง"];

  const handleSave=async()=>{
    setSaving(true);
    try{
      const d = new Date();
      const thDate = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
      await apiCall({
        action:"createDocument", id:Date.now(), status:"ส่งต่อ", docNumber:form.docNumber,
        subject:form.subject, sender:user.name || user.username, date:thDate, 
        purpose: JSON.stringify(form.purposes), 
        to:form.recipients.join(","), content:form.content, type:form.docTypes.join(",")
      });
      showToast("ส่งหนังสือสำเร็จ การแจ้งเตือนถูกส่งผ่าน Email แล้ว");
      onCreated();
    }catch{showToast("เกิดข้อผิดพลาด","err")}
    setSaving(false);
    setShowConfirm(false);
  };

  return(<div className="wiz">
    <div className="page-head" style={{marginBottom:15}}>
      <div><h2 style={{fontSize:22}}>สร้างหนังสือใหม่</h2><p>ระบบสร้างและส่งหนังสือราชการอิเล็กทรอนิกส์</p></div>
    </div>
    
    <div className="wiz-steps">
      {steps.map((s,i)=><React.Fragment key={i}>
        <div className={`wiz-step ${i===step?"active":""} ${i<step?"done":""}`} onClick={()=>{if(i<step)setStep(i)}}>
          <div className="wiz-step-num">{i<step?"✓":i+1}</div>{s}
        </div>
        {i<steps.length-1&&<span style={{color:'var(--bd)'}} key={i+'_arr'}>{I.chevR}</span>}
      </React.Fragment>)}
    </div>

    {step===0&&<div className="wiz-card">
      <div className="wiz-title">ตั้งค่ารูปแบบหนังสือ</div>
      <div className="wiz-row">
        <div className="fg full">
          <label>ประเภทหนังสือ *</label>
          {["หนังสือภายใน","หนังสือภายนอก","คำสั่ง/ประกาศ"].map(t=>
            <label key={t} className="fchk"><input type="checkbox" checked={form.docTypes.includes(t)} onChange={()=>toggleType(t)}/>{t}</label>
          )}
        </div>
        <div className="fg">
          <label>ชั้นความเร็ว</label>
          <select className="fi" value={form.urgency} onChange={e=>upd("urgency",e.target.value)}>
            <option>ปกติ</option><option>ด่วน</option><option>ด่วนที่สุด</option>
          </select>
        </div>
        <div className="fg">
          <label>ชั้นความลับ</label>
          <select className="fi" value={form.confidentiality} onChange={e=>upd("confidentiality",e.target.value)}>
            <option>ปกติ</option><option>ลับ</option><option>ลับที่สุด</option>
          </select>
        </div>
      </div>
    </div>}

    {step===1&&<div className="wiz-card">
      <div className="wiz-title">รายละเอียดหนังสือ</div>
      <div className="wiz-row">
        <div className="fg">
          <label>ที่ (เลขที่หนังสือ)</label>
          <input className="fi" placeholder="เช่น อว 8392(14)595" value={form.docNumber} onChange={e=>upd("docNumber",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>เรื่อง *</label>
          <input className="fi" placeholder="ระบุหัวข้อเรื่อง" value={form.subject} onChange={e=>upd("subject",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>เรียน</label>
          <input className="fi" placeholder="ระบุผู้รับ (ตามเอกสาร)" value={form.to} onChange={e=>upd("to",e.target.value)}/>
        </div>
      </div>
      <div className="fg full" style={{marginTop:15}}>
        <label>เนื้อหา / ข้อความอธิบายเพิ่มเติม</label>
        <RichEditor value={form.content} onChange={v=>upd("content",v)} placeholder="พิมพ์ความเห็น หรือเนื้อหาเอกสารที่นี่..."/>
      </div>
    </div>}

    {step===2&&<div className="wiz-card">
      <div className="wiz-title" style={{display:'flex',alignItems:'center',gap:10}}>
        {I.users} เลือกผู้รับและกำหนดวัตถุประสงค์
      </div>
      <div className="wiz-row">
        <div className="fg full">
          <label>1. ค้นหาและเลือกรายชื่อผู้รับ</label>
          <RecipientInput users={users} selected={form.recipients} 
            onAdd={u=>{
              if(!form.recipients.includes(u)){
                upd("recipients",[...form.recipients,u]);
                upd("purposes",{...form.purposes, [u]:"เพื่อทราบ"});
              }
            }} 
            onRemove={u=>{
              const nR = form.recipients.filter(x=>x!==u);
              const nP = {...form.purposes};
              delete nP[u];
              upd("recipients",nR);
              upd("purposes",nP);
            }}
          />
        </div>

        <div className="fg full">
          <label>2. กำหนดวัตถุประสงค์รายบุคคล</label>
          {form.recipients.length === 0 ? 
            <div style={{fontSize:14, color:'var(--t3)', padding:'15px', background:'#f8fafc', borderRadius:8, border:'1px dashed var(--bd)', textAlign:'center'}}>
              กรุณาเลือกผู้รับด้านบนก่อน
            </div> 
          : 
            form.recipients.map(r => {
              const purp = form.purposes[r] || "เพื่อทราบ";
              const pc = PURPOSE_COLORS[purp] || {bg:'#f1f3f4',color:'var(--t2)'};
              return (
                <div className="fwd-recipient-card" key={r}>
                  <div className="fwd-avatar" style={{background:pc.bg,color:pc.color}}>
                    {r[0].toUpperCase()}
                  </div>
                  <div>
                    <div className="fwd-name">{r}</div>
                  </div>
                  <select className="fwd-purpose-select" value={purp} onChange={e => upd("purposes", {...form.purposes, [r]: e.target.value})}>
                    {PURPOSE_OPTIONS.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>}

    {step===3&&<div className="wiz-card">
      <div className="wiz-title" style={{display:'flex',alignItems:'center',gap:10}}>
        {I.eye} ตรวจสอบรายละเอียดก่อนส่ง
      </div>

      <div className="summary-card">
        <div className="summary-title">{I.file} สรุปหนังสือ</div>
        
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <div>
            <div style={{fontSize:13,color:'var(--t2)'}}>เลขที่</div>
            <div style={{fontWeight:600}}>{form.docNumber || '-'}</div>
          </div>
          <div>
            <div style={{fontSize:13,color:'var(--t2)'}}>ประเภท</div>
            <div style={{fontWeight:600}}>{form.docTypes.join(', ')}</div>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:13,color:'var(--t2)',marginBottom:4}}>เรื่อง</div>
          <div style={{fontSize:16,fontWeight:700,color:'var(--p)'}}>{form.subject}</div>
        </div>

        <div style={{fontSize:13,color:'var(--t2)',marginBottom:8,marginTop:16}}>ผู้รับ และ วัตถุประสงค์</div>
        {form.recipients.map(r => {
          const purp = form.purposes[r] || "เพื่อทราบ";
          const pc = PURPOSE_COLORS[purp] || {bg:'#f1f3f4',color:'var(--t2)'};
          return (
            <div className="summary-item" key={r}>
              <div style={{width:32,height:32,borderRadius:'50%',background:pc.bg,color:pc.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,flexShrink:0}}>
                {r[0].toUpperCase()}
              </div>
              <div style={{flex:1,fontWeight:600,fontSize:14}}>{r}</div>
              <span className="summary-badge" style={{background:pc.bg,color:pc.color}}>{purp}</span>
            </div>
          );
        })}
      </div>

      <div style={{background:'var(--os)',borderRadius:8,padding:14,fontSize:14,color:'var(--ok)',marginTop:16,fontWeight:500}}>
        ✓ ระบบจะส่งการแจ้งเตือนอัตโนมัติผ่าน Email ไปยังผู้รับจำนวน {form.recipients.length} ท่าน
      </div>
    </div>}

    <div className="wiz-foot">
      <div>{step>0&&<button className="ba" onClick={()=>setStep(step-1)}>{I.back} ย้อนกลับ</button>}</div>
      <div style={{display:"flex",gap:10}}>
        <button className="ba" onClick={onClose}>ยกเลิก</button>
        {step<3
          ? <button className="bn" onClick={()=>setStep(step+1)} disabled={step===1&&!form.subject.trim()}>ขั้นตอนถัดไป {I.chevR}</button>
          : <button className="bn btn-ack" onClick={()=>setShowConfirm(true)} disabled={saving||form.recipients.length===0}>
              {I.send} ยืนยันส่งหนังสือ ({form.recipients.length} ท่าน)
            </button>
        }
      </div>
    </div>

    <ConfirmModal
      open={showConfirm}
      onClose={()=>setShowConfirm(false)}
      onConfirm={handleSave}
      title="ยืนยันการส่งหนังสือ"
      message={`คุณต้องการส่งหนังสือเรื่อง "${form.subject}" ไปยังผู้รับจำนวน ${form.recipients.length} ท่านใช่หรือไม่?`}
      icon={I.send}
      iconType="success"
      confirmText="ส่งหนังสือ"
      confirmStyle={{background:'var(--ok)'}}
      loading={saving}
    />
  </div>);
}


/* =================================================================
   MAIN APP
================================================================= */

function App(){
  const[cu,sCu]=useState(()=>{
    const s=sessionStorage.getItem("edoc_user");
    return s?JSON.parse(s):null;
  });

  useEffect(() => {
      if(!cu) window.location.href = "index.html"; 
  }, [cu]);
  
  const[pg,sPg]=useState("inbox");
  const[docs,sDocs]=useState([]);
  const[users,sUsers]=useState([]);
  const[ld,sLd]=useState(false);
  const[sel,sSel]=useState(null);
  const[toast,sToast]=useState(null);
  const[sq,sSq]=useState("");
  
  const [fwdMode, setFwdMode] = useState(null);
  const [recallModal, setRecallModal] = useState(null); // doc to recall
  const [recalling, setRecalling] = useState(false);
  const [recallReason, setRecallReason] = useState("");

  const tt=(m,t="ok")=>{sToast({m,t});setTimeout(()=>sToast(null),3000)};

  const fetchD=useCallback(async()=>{if(!cu)return;sLd(true);
    const r=await apiCall({action:"getDocuments",username:cu.username});
    if(r&&r.success)sDocs(r.data); sLd(false);
  },[cu]);
  
  const fetchU=useCallback(async()=>{if(!cu)return;
    const r=await apiCall({action:"getUsers"});
    if(r&&r.success)sUsers(r.data);
  },[cu]);

  useEffect(()=>{fetchD();fetchU()},[fetchD,fetchU]);

  const isDocRead = (d) => {
    if(!d.ReadBy) return false;
    const readStr = String(d.ReadBy);
    return readStr.includes(cu.username) || (cu.name && readStr.includes(cu.name));
  };

  const isDocRecalled = (d) => {
    return d.Status === "ดึงคืน" || d.Status === "recalled";
  };

  const isDocSentByMe = (d) => {
    return d.Sender === cu.username || d.Sender === cu.name;
  };

  const ack=async(d, callback)=>{
    if(isDocRead(d)) {
      if(callback) callback();
      return;
    }
    try{
      await apiCall({action:"acknowledge",rowIndex:d.rowIndex,subject:d.Subject,userName:cu.name || cu.username});
      tt("รับทราบแล้ว");
      fetchD();
      
      const newReadBy = d.ReadBy ? d.ReadBy + ", " + (cu.name || cu.username) : (cu.name || cu.username);
      sSel({...d, ReadBy: newReadBy});
      
      if(callback) callback();
    }catch{tt("เกิดข้อผิดพลาด","err")}
  };

  const handleForward = (d) => { ack(d, () => setFwdMode("forward")); };
  const handleReply = (d) => { ack(d, () => setFwdMode("reply")); };

  const handleOpenCreate = () => {
    setFwdMode(null); 
    sSel(null);
    sPg("create");
  };

  // ===== ดึงหนังสือคืน =====
  const handleRecall = async () => {
    if(!recallModal) return;
    setRecalling(true);
    try {
      await apiCall({
        action: "recallDocument",
        rowIndex: recallModal.rowIndex,
        subject: recallModal.Subject,
        sender: cu.name || cu.username,
        reason: recallReason
      });
      tt("ดึงหนังสือคืนสำเร็จ — ผู้รับจะไม่สามารถดำเนินการกับเอกสารนี้ได้อีก");
      setRecallModal(null);
      setRecallReason("");
      fetchD();
      sSel(null);
    } catch {
      tt("เกิดข้อผิดพลาดในการดึงหนังสือคืน", "err");
    }
    setRecalling(false);
  };

  if(!cu) return null; 

  const canManageDocs = cu.role === "ผู้ดูแลระบบ" || cu.role === "สารบัญ";
  const isSysAdmin = cu.role === "ผู้ดูแลระบบ";

  const myInbox = docs.filter(d => {
    if(!d.To) return false;
    const toStr = String(d.To);
    return toStr.includes(cu.username) || (cu.name && toStr.includes(cu.name));
  });

  const ic = myInbox.filter(d => !isDocRead(d) && !isDocRecalled(d)).length;
  const fD = myInbox.filter(d => {
    const q=sq.toLowerCase();
    return !q||(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q);
  });

  const myOutbox = docs.filter(d => d.Sender===cu.username || d.Sender===cu.name);

  const selIsRead = sel ? isDocRead(sel) : false;
  const selIsRecalled = sel ? isDocRecalled(sel) : false;
  const selIsMine = sel ? isDocSentByMe(sel) : false;

  return(<div className="app"><style>{CSS}</style>
    <header className="top">
      <div className="top-l" style={{cursor:'pointer'}} onClick={()=>{sPg("inbox");sSel(null);setFwdMode(null);}}>
        <img src="school logo.jpg" className="logo-sm" onError={e=>e.target.style.display='none'}/>
        <div>
           <div className="top-title">ระบบจัดการเอกสารอิเล็กทรอนิกส์</div>
           <div className="top-sub">โรงเรียนป่าก้าง</div>
        </div>
      </div>
      <div className="top-r">
        <div className="u-info"><div className="u-name">{cu.name || cu.username}</div><div className="u-role">{cu.role}</div></div>
        <button className="btn-logout" onClick={()=>{sessionStorage.removeItem("edoc_user");window.location.href="index.html"}}>ออกจากระบบ</button>
      </div>
    </header>
    <div className="main-body">
      <aside className="sb">
         <SB pg={pg} nav={(p)=>{sPg(p);sSel(null);setFwdMode(null);}} user={cu} cnt={ic} canManageDocs={canManageDocs} isSysAdmin={isSysAdmin} />
      </aside>

      <main className="mn">
        {fwdMode && sel ? <ForwardWizard user={cu} users={users} doc={sel} isReply={fwdMode==="reply"} onClose={()=>setFwdMode(null)} onForwarded={()=>{setFwdMode(null); sSel(null); fetchD();}} showToast={tt}/>
        
        :sel?<div className="det">
          <div className="deth"><button className="detbk" onClick={()=>sSel(null)}>{I.back}</button><div><h2 style={{fontSize:22,color:'var(--p)'}}>{sel.Subject}</h2><div style={{color:'var(--t2)',fontSize:14}}>เลขที่: {sel.DocNumber||"-"}</div></div></div>
          <div className="detc">
            
            {/* แสดงแบนเนอร์ถ้าเอกสารถูกดึงคืน */}
            {selIsRecalled && (
              <div className="recall-banner">
                {I.recall} เอกสารนี้ถูกดึงคืนโดยผู้ส่ง — ไม่สามารถดำเนินการต่อได้
              </div>
            )}

            <div style={{display:'flex',gap:10,marginBottom:20}}>
              {selIsRecalled 
                ? <div className="status-recalled">{I.recall} ถูกดึงคืน</div>
                : selIsRead 
                  ? <div className="status-success">{I.check} รับทราบแล้ว</div> 
                  : <div className="status-wait">รอการรับทราบจากท่าน</div>
              }
            </div>

            <div className="detg">
              <div><div className="detfl">ผู้ส่ง</div><div className="detfp">{sel.Sender}</div></div>
              <div><div className="detfl">ลงวันที่</div><div className="detfp">{sel.Date}</div></div>
              <div>
                 <div className="detfl">วัตถุประสงค์</div>
                 <div className="detfp" style={{color:'var(--dn)'}}>
                    {getAllPurposes(sel.Purpose)}
                 </div>
              </div>
              <div>
                 <div className="detfl">ผู้รับทราบ (ทั้งหมด)</div>
                 <div className="detfp" style={{fontSize:13, color:'var(--t2)'}}>{sel.ReadBy||'ยังไม่มีผู้รับทราบ'}</div>
              </div>
            </div>
            
            <div style={{marginTop:25,paddingTop:20,borderTop:'1px solid var(--bd)'}}>
              <div className="detfl">เนื้อหา / ข้อความ</div>
              <div className="detcn" dangerouslySetInnerHTML={{__html: sel.Content||'<span style="color:var(--t3)">ไม่มีเนื้อหา</span>'}} />
            </div>
            
            {/* ประวัติการส่งต่อ/เกษียณหนังสือ */}
            <div style={{marginTop:25, paddingTop:20, borderTop:'1px solid var(--bd)'}}>
              <div className="detfl" style={{fontSize: 14, color: 'var(--p)', marginBottom: 8}}>{I.forward} ลำดับการรับ-ส่ง / เกษียณหนังสือ</div>
              <div className="routing-history">
                 {renderRoutingHistory(sel.RoutingHistory)}
              </div>
            </div>

            {sel.FileLink&&<div style={{marginTop:20}}><a href={sel.FileLink} target="_blank" className="ba bl" style={{width:'fit-content',textDecoration:'none'}}>{I.file} เปิดดูไฟล์แนบ</a></div>}
            
            {/* แถบปุ่มดำเนินการ */}
            {!selIsRecalled && (
              <div className="action-bar">
                 {!selIsRead && <button className="bn btn-ack" onClick={()=>ack(sel)}>{I.check} รับทราบ</button>}
                 <button className="bn btn-fwd" onClick={()=>handleForward(sel)}>{I.forward} {selIsRead?'ส่งต่อเอกสาร':'รับทราบและส่งต่อ'}</button>
                 <button className="bn btn-rep" onClick={()=>handleReply(sel)}>{I.reply} {selIsRead?'ตอบกลับ':'รับทราบและตอบกลับ'}</button>
                 
                 {/* ปุ่มดึงหนังสือคืน — แสดงเฉพาะเอกสารที่ตัวเองส่ง */}
                 {selIsMine && (
                   <button className="bn btn-recall" onClick={()=>{setRecallReason("");setRecallModal(sel);}}>
                     {I.recall} ดึงหนังสือคืน
                   </button>
                 )}
              </div>
            )}

          </div>
        </div>
        
        :pg==="create" && canManageDocs?<CreateWizard user={cu} users={users} onClose={()=>sPg("inbox")} onCreated={()=>{sPg("inbox");fetchD()}} showToast={tt}/>
        
        :pg==="inbox"?<div>
          <div className="page-head">
             <div><h2>รายการเอกสารเข้า</h2><p>คลิกเพื่อเปิดอ่านรายละเอียดและกดรับทราบ</p></div>
             {canManageDocs && <button className="bn" onClick={handleOpenCreate}>{I.plus} สร้างหนังสือใหม่</button>}
          </div>
          <div className="tc">
            <div className="tch"><div className="tct">กล่องขาเข้าของคุณ</div><div className="sbx">{I.search}<input placeholder="ค้นหาเรื่อง, เลขที่..." value={sq} onChange={e=>sSq(e.target.value)}/></div></div>
            {ld?<div className="ldr"><div className="ldrs"/>กำลังโหลด...</div>:fD.length>0?<table className="dt">
            <thead><tr><th style={{width:'15%'}}>สถานะ</th><th style={{width:'20%'}}>เลขที่</th><th style={{width:'45%'}}>เรื่อง</th><th style={{width:'20%'}}>ผู้ส่ง</th></tr></thead>
            <tbody>{fD.map((d,i)=>{
              const isR = isDocRead(d);
              const recalled = isDocRecalled(d);
              return <tr key={i} onClick={()=>sSel(d)} style={recalled?{opacity:0.6}:{}}>
                <td>
                  {recalled
                    ? <div className="status-recalled">{I.recall} ดึงคืน</div>
                    : isR
                      ? <div className="status-success">{I.check} ทราบแล้ว</div>
                      : <div className="status-wait">รอรับทราบ</div>
                  }
                </td>
                <td><div className="dn">{d.DocNumber||"-"}</div></td>
                <td>
                   <div className="ds">{d.Subject}</div>
                   <div className="dm">
                      <span>{I.clock} {d.Date}</span>
                      {!recalled && <span style={{color:'var(--dn)'}}>{I.pin} {getMyPurpose(d.Purpose, cu.name || cu.username)}</span>}
                   </div>
                </td>
                <td><div style={{fontWeight:500}}>{d.Sender?d.Sender.split('(')[0]:'-'}</div><div style={{fontSize:12,color:'var(--t2)'}}>{d.Sender&&d.Sender.includes('(')?'('+d.Sender.split('(')[1]:''}</div></td>
              </tr>
            })}</tbody></table>:<div className="emp"><div className="emp-i">📭</div><div className="emp-t">ไม่มีเอกสารเข้าใหม่</div></div>}
          </div>
        </div>
        
        :pg==="outbox"?<div>
          <div className="page-head">
            <div><h2>เอกสารส่งออก</h2><p>หนังสือที่ท่านเป็นผู้ส่ง — สามารถดึงคืนได้ก่อนผู้รับรับทราบทั้งหมด</p></div>
            {canManageDocs && <button className="bn" onClick={handleOpenCreate}>{I.plus} สร้างใหม่</button>}
          </div>
          <div className="tc">
            <div className="tch"><div className="tct">รายการเอกสารส่งออก</div></div>
            {myOutbox.length>0?<table className="dt">
            <thead><tr><th style={{width:'12%'}}>สถานะ</th><th style={{width:'15%'}}>เลขที่</th><th style={{width:'35%'}}>เรื่อง</th><th style={{width:'20%'}}>ผู้รับ</th><th style={{width:'18%'}}>วันที่</th></tr></thead>
            <tbody>{myOutbox.map((d,i)=>{
              const recalled = isDocRecalled(d);
              return <tr key={i} onClick={()=>sSel(d)} style={recalled?{opacity:0.6}:{}}>
                <td>
                  {recalled 
                    ? <div className="status-recalled" style={{fontSize:12,padding:'4px 10px'}}>{I.recall} ดึงคืน</div>
                    : <div className="status-success" style={{fontSize:12,padding:'4px 10px'}}>{I.send} ส่งแล้ว</div>
                  }
                </td>
                <td><span className="dn">{d.DocNumber||"-"}</span></td>
                <td><div className="ds">{d.Subject}</div></td>
                <td style={{fontSize:13}}>{(d.To||"").split(',').length > 1 ? (d.To.split(',')[0] + ' +' + ((d.To.split(',').length)-1) + ' ท่าน') : d.To}</td>
                <td style={{fontSize:13}}>{d.Date}</td>
              </tr>
            })}</tbody></table>:<div className="emp"><div className="emp-i">📤</div><div className="emp-t">ยังไม่มีประวัติการส่งออก</div></div>}
          </div>
        </div>
        
        :pg==="search"?<div className="tc">
          <div style={{padding:20}}><div className="sbx" style={{background:'#fff',border:'1px solid var(--bd)'}}>{I.search}<input placeholder="พิมพ์คำค้นหา..." value={sq} onChange={e=>sSq(e.target.value)} style={{fontSize:15}}/></div></div>
          {sq.trim()?<table className="dt">
          <thead><tr><th>เลขที่</th><th>เรื่อง</th><th>ผู้ส่ง</th><th>วันที่</th></tr></thead>
          <tbody>{docs.filter(d=>{const q=sq.toLowerCase();return(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q)||(d.Sender||"").toLowerCase().includes(q)}).map((d,i)=><tr key={i} onClick={()=>sSel(d)}>
            <td><span className="dn">{d.DocNumber||"-"}</span></td>
            <td><div className="ds" style={{fontSize:15}}>{d.Subject}</div></td><td style={{fontSize:13}}>{d.Sender}</td><td style={{fontSize:13}}>{d.Date}</td>
          </tr>)}</tbody></table>:<div className="emp"><div className="emp-i">🔍</div><div className="emp-t">ค้นหาเอกสารทั้งหมดในระบบ</div></div>}
        </div>
        
        :<div className="emp"><div className="emp-i">🚧</div><div className="emp-t" style={{color:'var(--p)',fontSize:20,marginBottom:10}}>ฟังก์ชันนี้กำลังอยู่ระหว่างการพัฒนา</div><p>ระบบจะเปิดให้ใช้งานในเร็วๆ นี้</p></div>}
      </main>
    </div>
    {toast&&<div className={`toast toast-${toast.t}`}>{toast.t==="ok"?I.check:toast.t==="warn"?"⚠":"⚠"} {toast.m}</div>}

    {/* ===== MODAL ดึงหนังสือคืน ===== */}
    {recallModal && (
      <div className="modal-overlay" onClick={()=>setRecallModal(null)}>
        <div className="modal-box" onClick={e=>e.stopPropagation()}>
          <div className="modal-head">
            <div className="modal-icon danger">{I.recall}</div>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:'var(--t)'}}>ดึงหนังสือคืน</div>
              <div style={{fontSize:14,color:'var(--t2)',marginTop:4}}>เรื่อง: {recallModal.Subject}</div>
            </div>
          </div>
          <div className="modal-body">
            <p style={{marginBottom:16}}>
              การดึงหนังสือคืนจะทำให้ผู้รับทุกท่านไม่สามารถดำเนินการกับเอกสารนี้ได้อีก และจะแสดงสถานะ "ดึงคืน" ในระบบ
            </p>
            <div style={{marginBottom:8}}>
              <label style={{fontSize:14,fontWeight:600,color:'var(--t2)',display:'block',marginBottom:6}}>เหตุผลในการดึงคืน (ไม่บังคับ)</label>
              <textarea 
                className="fi" 
                style={{minHeight:80,resize:'vertical'}} 
                placeholder="ระบุเหตุผล เช่น ส่งผิดผู้รับ, ข้อมูลไม่ถูกต้อง, ยกเลิกหนังสือ..."
                value={recallReason}
                onChange={e=>setRecallReason(e.target.value)}
              />
            </div>
            <div style={{background:'var(--ds)',borderRadius:8,padding:12,fontSize:13,color:'var(--dn)',fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
              {I.warn} การดึงคืนไม่สามารถยกเลิกได้ กรุณาตรวจสอบให้แน่ใจก่อนดำเนินการ
            </div>
          </div>
          <div className="modal-foot">
            <button className="ba" onClick={()=>setRecallModal(null)} disabled={recalling}>ยกเลิก</button>
            <button className="bn btn-recall" onClick={handleRecall} disabled={recalling}>
              {recalling ? "กำลังดำเนินการ..." : <>{I.recall} ยืนยันดึงคืน</>}
            </button>
          </div>
        </div>
      </div>
    )}
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
