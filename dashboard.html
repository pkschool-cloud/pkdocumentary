// ===== STYLES =====
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');
:root{
  --f:'IBM Plex Sans Thai','Noto Sans Thai',sans-serif;
  --p:#1e3a5f;--ph:#152d4a;--ps:#edf2f7;--pa:#3182ce;
  --ac:#d69e2e;--as:#fffbeb;--dn:#c53030;--ds:#fed7d7;--ok:#2f855a;--os:#c6f6d5;
  --bg:#f0f2f5;--sf:#fff;
  --t:#1a202c;--t2:#4a5568;--t3:#a0aec0;--bd:#e2e8f0;
  --sh:0 1px 3px rgba(0,0,0,.08);--r:8px;--rl:12px;--rx:16px
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body,html,#root{height:100%;font-family:var(--f);background:var(--bg);color:var(--t);overflow:hidden}
::selection{background:#bee3f8;color:#1a365d}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideL{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

.fi{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;font-family:var(--f);background:#f7fafc;transition:.2s;outline:none}
.fi:focus{border-color:var(--pa);background:#fff;box-shadow:0 0 0 3px rgba(49,130,206,.12)}
select.fi{cursor:pointer;appearance:auto}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.top{height:64px;background:linear-gradient(135deg,#1e3a5f 0%,#2c5282 100%);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:10;color:#fff}
.top-l{display:flex;align-items:center;gap:14px;cursor:pointer}
.top-l:hover{opacity:.9}
.logo-box{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;backdrop-filter:blur(4px)}
.top-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.top-sub{font-size:12px;opacity:.75;margin-top:-1px}
.top-r{display:flex;align-items:center;gap:16px}
.u-info{text-align:right;line-height:1.3}
.u-name{font-weight:600;font-size:14px}
.u-role{font-size:11px;opacity:.8}
.btn-logout{background:rgba(255,255,255,.15);border:none;padding:7px 14px;border-radius:6px;color:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:.2s;font-family:var(--f);backdrop-filter:blur(4px)}
.btn-logout:hover{background:rgba(255,255,255,.25)}

.main-body{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sb{width:250px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sbn{padding:16px 12px}
.sbt{font-size:11px;text-transform:uppercase;color:var(--t3);font-weight:700;padding:8px 12px 6px;margin-top:8px;letter-spacing:.5px}
.sbi{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;font-size:14px;color:var(--t2);font-weight:500;margin-bottom:2px}
.sbi:hover{background:var(--ps);color:var(--p)}
.sbi.on{background:var(--ps);color:var(--p);font-weight:600}
.sbi .sbbg{margin-left:auto;font-size:11px;font-weight:700;background:var(--dn);color:#fff;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}

/* CONTENT */
.mn{flex:1;overflow-y:auto;background:var(--bg);padding:24px 32px}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
.page-head h2{font-size:22px;font-weight:700;color:var(--t);margin-bottom:2px}
.page-head p{color:var(--t2);font-size:13px}

.bn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;font-family:var(--f)}
.bn:hover{background:var(--ph);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.bn:disabled{opacity:.5;cursor:wait;transform:none;box-shadow:none}

.ba{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#edf2f7;color:var(--t2);border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:.2s;font-family:var(--f)}
.ba:hover{background:#e2e8f0;color:var(--t)}

/* TABLE */
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;animation:fadeUp .35s}
.tch{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd)}
.tct{font-size:15px;font-weight:700}
.sbx{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:8px;padding:7px 12px;border:1.5px solid transparent;transition:.2s}
.sbx:focus-within{border-color:var(--pa);background:#fff;box-shadow:0 0 0 3px rgba(49,130,206,.12)}
.sbx input{border:none;background:none;font-size:13px;font-family:var(--f);outline:none;flex:1;width:180px}

table.dt{width:100%;border-collapse:collapse;text-align:left}
table.dt th{padding:12px 16px;font-size:12px;font-weight:700;color:var(--t3);background:#f7fafc;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.3px}
table.dt td{padding:14px 16px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
table.dt tbody tr{transition:.1s;cursor:pointer}
table.dt tbody tr:hover{background:#f7fafc}

.ds{font-weight:600;color:var(--p);font-size:14px;margin-bottom:3px}
.dm{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.status-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.status-success{background:var(--os);color:var(--ok)}
.status-wait{background:#fef3c7;color:#d69e2e}
.status-danger{background:var(--ds);color:var(--dn)}
.status-info{background:var(--ps);color:var(--p)}
.status-sign{background:#fef9c3;color:#a16207}

.emp{text-align:center;padding:50px 20px;color:var(--t2)}
.emp-i{font-size:42px;margin-bottom:12px;opacity:.5}
.emp-t{font-size:15px;font-weight:600}

/* DETAIL */
.det{animation:slideL .3s}
.deth{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.detbk{width:36px;height:36px;border-radius:8px;border:1px solid var(--bd);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;color:var(--t2)}
.detbk:hover{background:var(--ps);color:var(--p);border-color:var(--pa)}
.detc{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:28px}
.detg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.detfl{font-size:12px;color:var(--t3);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.detfp{font-size:14px;font-weight:500;color:var(--t)}
.detcn{background:#f7fafc;border:1px solid var(--bd);border-radius:8px;padding:18px;line-height:1.7;font-size:14px;margin-top:8px}

.action-bar{margin-top:24px;padding-top:18px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap}
.btn-ack{background:var(--ok);color:white}.btn-ack:hover{background:#276749}
.btn-fwd{background:var(--p);color:white}.btn-fwd:hover{background:var(--ph)}
.btn-rep{background:#4a5568;color:white}.btn-rep:hover{background:#2d3748}
.btn-recall{background:var(--dn);color:white}.btn-recall:hover{background:#9b2c2c}
.btn-sign{background:#d69e2e;color:white}.btn-sign:hover{background:#b7791f}

/* Routing */
.rt-box{background:#fff;border:1px solid var(--bd);border-radius:8px;margin-top:10px;overflow:hidden}
.rt-head{background:#f7fafc;padding:10px 14px;border-bottom:1px solid var(--bd);font-size:13px;color:var(--t2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rt-body{padding:12px 14px;font-size:13px;line-height:1.6}

/* WIZARD */
.wiz{animation:fadeUp .3s}
.wiz-steps{display:flex;align-items:center;margin-bottom:20px;background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:12px 20px;gap:6px;flex-wrap:wrap}
.wiz-step{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;transition:.2s}
.wiz-step.active{background:var(--ps);color:var(--p);font-weight:600}
.wiz-step.done{color:var(--ok);font-weight:600}
.wiz-step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--bd)}
.wiz-step.active .wiz-step-num{border-color:var(--pa);background:var(--pa);color:#fff}
.wiz-step.done .wiz-step-num{border-color:var(--ok);background:var(--os);color:var(--ok)}
.wiz-card{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:24px;animation:fadeUp .3s}
.wiz-title{font-size:16px;font-weight:700;color:var(--t);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--bd);display:flex;align-items:center;gap:10px}
.wiz-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg{margin-bottom:12px}.fg.full{grid-column:1/-1}
.fg>label{display:block;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:6px}
.fchk{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px;cursor:pointer}
.fchk input{width:17px;height:17px;accent-color:var(--pa)}

/* EDITOR */
.editor-wrap{border:1.5px solid var(--bd);border-radius:8px;overflow:hidden;background:#fff}
.editor-toolbar{display:flex;gap:3px;padding:6px 8px;background:#f7fafc;border-bottom:1px solid var(--bd)}
.editor-btn{width:30px;height:30px;border:none;background:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:.15s}
.editor-btn:hover{background:var(--ps);color:var(--pa)}
.editor-body{min-height:160px;padding:14px;font-size:14px;line-height:1.7;outline:none;font-family:var(--f)}
.editor-body:empty::before{content:attr(data-placeholder);color:var(--t3)}

/* RECIPIENT */
.recip-wrap{position:relative}
.recip-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--bd);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:50;max-height:200px;overflow-y:auto}
.recip-opt{padding:10px 14px;cursor:pointer;font-size:13px;transition:.1s;display:flex;align-items:center;gap:10px}
.recip-opt:hover{background:var(--ps);color:var(--p)}
.recip-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--ps);color:var(--p);border-radius:16px;font-size:12px;font-weight:500;margin:3px}
.recip-tag button{background:none;border:none;color:var(--p);cursor:pointer;font-size:14px;line-height:1}

.wiz-foot{display:flex;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--bd)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;animation:slideUp .3s;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#fff}
.toast-ok{background:var(--ok)}.toast-err{background:var(--dn)}.toast-warn{background:var(--ac)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9998;animation:fadeIn .15s;backdrop-filter:blur(3px)}
.modal-box{background:#fff;border-radius:var(--rx);padding:0;width:95%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:scaleIn .2s;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px 0;display:flex;align-items:flex-start;gap:14px}
.modal-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-icon.danger{background:var(--ds);color:var(--dn)}
.modal-icon.info{background:var(--ps);color:var(--p)}
.modal-icon.success{background:var(--os);color:var(--ok)}
.modal-icon.sign{background:#fef9c3;color:#a16207}
.modal-body{padding:16px 24px}

// ===== HELPERS =====
const getMyPurpose = (purposeStr, me) => {
  if(!purposeStr) return "-";
  try { const p = JSON.parse(purposeStr); return p[me] || "เพื่อทราบ"; }
  catch { return purposeStr; }
};
const getAllPurposes = (purposeStr) => {
  if(!purposeStr) return "-";
  try { const p = JSON.parse(purposeStr); return Object.entries(p).map(([n,v])=>`${n} (${v})`).join(", "); }
  catch { return purposeStr; }
};
const getFileExt = (name) => {
  const ext = name.split('.').pop().toLowerCase();
  if(['pdf'].includes(ext)) return 'pdf';
  if(['doc','docx'].includes(ext)) return 'doc';
  if(['jpg','jpeg','png','gif','webp'].includes(ext)) return 'img';
  return 'other';
};
const renderRoutingHistory = (histStr) => {
  if (!histStr || histStr === "[]") return <div style={{color:'var(--t3)',marginTop:8,fontSize:12}}>ยังไม่มีประวัติการส่งต่อ</div>;
  try {
    const hist = JSON.parse(histStr);
    return hist.map((h,i)=>(
      <div className="rt-box" key={i}>
        <div className="rt-head">
          <span style={{background:h.type==='recall'?'#c53030':h.type==='sign'?'#d69e2e':'#3182ce',color:'#fff',padding:'2px 6px',borderRadius:8,fontSize:10,fontWeight:700}}>
            {h.type==='recall'?'ดึงคืน':h.type==='sign'?'ลงนาม':'ส่งต่อ'}
          </span>
          {h.type==='recall'?<><b>{h.from}</b> ดึงคืนจาก <b>{(h.to||"").split(',').join(', ')}</b></>
          :h.type==='sign'?<><b>{h.from}</b> ลงนามเอกสาร</>
          :<>จาก <b>{h.from}</b> ถึง <b>{(h.to||"").split(',').join(', ')}</b></>}
          <span style={{marginLeft:'auto',fontSize:12}}>{I.clock} {h.date}</span>
        </div>
        <div className="rt-body" dangerouslySetInnerHTML={{__html:h.comment||'<span style="color:var(--t3)">ไม่มีข้อความ</span>'}}/>
      </div>
    ));
  } catch { return <div style={{color:'var(--t3)'}}>ไม่สามารถอ่านประวัติได้</div>; }
};

// ===== COMPONENTS =====
function RichEditor({value, onChange, placeholder}) {
  const ref = useRef(null);
  useEffect(()=>{if(ref.current&&value!==ref.current.innerHTML)ref.current.innerHTML=value||""},[value]);
  const exec=(cmd,v)=>{document.execCommand(cmd,false,v);ref.current?.focus();onChange?.(ref.current.innerHTML)};
  const handleInput=()=>onChange?.(ref.current?.innerHTML||"");
  return(
    <div className="editor-wrap">
      <div className="editor-toolbar">
        <button type="button" className="editor-btn" onClick={()=>exec("bold")} title="ตัวหนา">{I.bold}</button>
        <button type="button" className="editor-btn" onClick={()=>exec("italic")} title="ตัวเอียง">{I.italic}</button>
        <button type="button" className="editor-btn" onClick={()=>exec("underline")} title="ขีดเส้นใต้">{I.underline}</button>
      </div>
      <div ref={ref} className="editor-body" contentEditable suppressContentEditableWarning data-placeholder={placeholder||"ระบุรายละเอียด..."} onInput={handleInput} onBlur={handleInput}/>
    </div>
  );
}

function RecipientInput({users,selected,onAdd,onRemove}){
  const[q,sQ]=useState("");const[show,sShow]=useState(false);
  const filtered=(users||[]).filter(u=>{
    const s=`${u.FullName||u.Username} ${u.Position||''}`.toLowerCase();
    return s.includes(q.toLowerCase())&&!selected.includes(u.FullName||u.Username);
  });
  return(<div className="recip-wrap">
    <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:selected.length?8:0}}>
      {selected.map(s=><span key={s} className="recip-tag">{s}<button onClick={()=>onRemove(s)}>×</button></span>)}
    </div>
    <input className="fi" style={{marginBottom:0}} placeholder="พิมพ์ชื่อ หรือ ตำแหน่งเพื่อค้นหา..." value={q} onChange={e=>{sQ(e.target.value);sShow(true)}} onFocus={()=>sShow(true)} onBlur={()=>setTimeout(()=>sShow(false),250)}/>
    {show&&q&&filtered.length>0&&<div className="recip-dd">
      {filtered.map(u=><div key={u.Username} className="recip-opt" onMouseDown={e=>{e.preventDefault();onAdd(u.FullName||u.Username);sQ("");sShow(false)}}>
        <div style={{width:28,height:28,borderRadius:'50%',background:"var(--ps)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--p)",fontWeight:700,fontSize:12}}>
          {(u.FullName||u.Username)[0]}
        </div>
        <div>
          <div style={{fontWeight:600,fontSize:13}}>{u.FullName||u.Username}</div>
          <div style={{fontSize:11,color:"var(--t3)"}}>{u.Position||u.Role}</div>
        </div>
        {u.CanSign&&<span style={{marginLeft:'auto',fontSize:10,background:'#fef9c3',color:'#a16207',padding:'2px 6px',borderRadius:8,fontWeight:600}}>ผู้มีอำนาจลงนาม</span>}
      </div>)}
    </div>}
  </div>);
}

function ConfirmModal({open,onClose,onConfirm,title,message,icon,iconType,confirmText,confirmStyle,loading,children}){
  if(!open)return null;
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className={`modal-icon ${iconType||'info'}`}>{icon}</div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:'var(--t)'}}>{title}</div>
          </div>
        </div>
        <div className="modal-body">
          {typeof message==='string'?<p>{message}</p>:message}
          {children}
        </div>
        <div className="modal-foot">
          <button className="ba" onClick={onClose} disabled={loading}>ยกเลิก</button>
          <button className="bn" style={confirmStyle} onClick={onConfirm} disabled={loading}>
            {loading?"กำลังดำเนินการ...":confirmText}
          </button>
        </div>
      </div>
    </div>
  );
}

function FileUploadZone({files,onFilesChange}){
  const[dragging,setDragging]=useState(false);
  const inputRef=useRef(null);
  const handleFiles=(fl)=>{
    const arr = Array.from(fl);
    const newFiles = arr.map(f=>({name:f.name,size:f.size,type:f.type,file:f,id:Date.now()+Math.random()}));
    onFilesChange([...(files||[]),...newFiles]);
  };
  return(
    <div>
      <div className={`upload-zone ${dragging?'dragging':''}`}
        onClick={()=>inputRef.current?.click()}
        onDragOver={e=>{e.preventDefault();setDragging(true)}}
        onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);handleFiles(e.dataTransfer.files)}}>
        <div style={{color:'var(--pa)',marginBottom:8}}>{I.upload}</div>
        <div style={{fontSize:14,fontWeight:600,color:'var(--t)',marginBottom:4}}>ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือก</div>
        <div style={{fontSize:12,color:'var(--t3)'}}>รองรับ .pdf, .doc, .docx, .jpg, .png, .xls, .xlsx (สูงสุด 10MB)</div>
        <input ref={inputRef} type="file" multiple style={{display:'none'}} accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.xls,.xlsx" onChange={e=>handleFiles(e.target.files)}/>
      </div>
      {files&&files.length>0&&<div className="file-list" style={{marginTop:10}}>
        {files.map((f,i)=>{
          const ext=getFileExt(f.name);
          return <div className="file-item" key={f.id||i}>
            <div className={`file-icon file-${ext}`}>{ext.toUpperCase()}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:13}}>{f.name}</div>
              <div style={{fontSize:11,color:'var(--t3)'}}>{f.size?(f.size/1024).toFixed(1)+' KB':''}</div>
            </div>
            <button style={{background:'none',border:'none',color:'var(--dn)',cursor:'pointer',padding:4}} onClick={()=>onFilesChange(files.filter((_,j)=>j!==i))}>
              {I.x}
            </button>
          </div>
        })}
      </div>}
    </div>
  );
}

// ===== FORWARD WIZARD =====
function ForwardWizard({user,users,doc,onClose,onForwarded,showToast,isReply}){
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({
    recipients:isReply?[doc.Sender]:[],
    purposes:isReply?{[doc.Sender]:"เพื่อทราบ"}:{},
    comment:""
  });
  const[saving,setSaving]=useState(false);
  const[showConfirm,setShowConfirm]=useState(false);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const steps=["เลือกผู้รับ","วัตถุประสงค์","ตรวจสอบและส่ง"];

  const getUserInfo=(name)=>(users||[]).find(u=>(u.FullName||u.Username)===name)||{FullName:name,Position:'',Username:name};

  const handleSave=async()=>{
    setSaving(true);
    try{
      await apiCall({action:"forwardDocument",rowIndex:doc.rowIndex,subject:doc.Subject,sender:user.name||user.username,to:form.recipients.join(","),purpose:JSON.stringify(form.purposes),comment:form.comment});
      showToast("เกษียณและส่งต่อสำเร็จ");
      onForwarded();
    }catch{showToast("เกิดข้อผิดพลาด","err")}
    setSaving(false);setShowConfirm(false);
  };

  return(<div className="wiz">
    <div className="page-head" style={{marginBottom:12}}>
      <div><h2 style={{fontSize:20}}>{isReply?"ตอบกลับเอกสาร":"เกษียณและส่งต่อเอกสาร"}</h2>
      <p>เรื่อง: {doc.Subject}</p></div>
    </div>
    <div className="wiz-steps">
      {steps.map((s,i)=><React.Fragment key={i}>
        <div className={`wiz-step ${i===step?"active":""} ${i<step?"done":""}`} onClick={()=>{if(i<step)setStep(i)}}>
          <div className="wiz-step-num">{i<step?"✓":i+1}</div>{s}
        </div>
        {i<steps.length-1&&<span style={{color:'var(--bd)'}} key={i+'a'}>{I.chevR}</span>}
      </React.Fragment>)}
    </div>

    {step===0&&<div className="wiz-card">
      <div className="wiz-title">{I.users} เลือกผู้รับ</div>
      <div className="fg full">
        <label>ค้นหาและเลือกรายชื่อ (เลือกได้หลายท่าน)</label>
        <RecipientInput users={users} selected={form.recipients}
          onAdd={u=>{if(!form.recipients.includes(u)){upd("recipients",[...form.recipients,u]);upd("purposes",{...form.purposes,[u]:"เพื่อทราบ"})}}}
          onRemove={u=>{upd("recipients",form.recipients.filter(x=>x!==u));const p={...form.purposes};delete p[u];upd("purposes",p)}}/>
      </div>
      {form.recipients.length>0&&<div style={{background:'var(--os)',borderRadius:8,padding:10,fontSize:13,color:'var(--ok)',fontWeight:500,marginTop:8}}>✓ เลือกแล้ว {form.recipients.length} ท่าน</div>}
    </div>}

    {step===1&&<div className="wiz-card">
      <div className="wiz-title">{I.stamp} กำหนดวัตถุประสงค์</div>
      {form.recipients.map(r=>{
        const purp=form.purposes[r]||"เพื่อทราบ";const pc=PURPOSE_COLORS[purp]||{bg:'#f1f3f4',color:'var(--t2)'};
        const uInfo=getUserInfo(r);
        return(<div className="fwd-recipient-card" key={r}>
          <div className="fwd-avatar" style={{background:pc.bg,color:pc.color}}>{r[0]}</div>
          <div><div className="fwd-name">{r}</div><div className="fwd-pos">{uInfo.Position||''}</div></div>
          <select className="fwd-purpose-select" value={purp} onChange={e=>upd("purposes",{...form.purposes,[r]:e.target.value})}>
            {PURPOSE_OPTIONS.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        </div>);
      })}
      <div className="fg full" style={{marginTop:16}}>
        <label>ข้อความเกษียณหนังสือ</label>
        <RichEditor value={form.comment} onChange={v=>upd("comment",v)} placeholder="ความเห็น คำสั่งการ หรือข้อเสนอแนะ..."/>
      </div>
    </div>}

    {step===2&&<div className="wiz-card">
      <div className="wiz-title">{I.eye} ตรวจสอบก่อนส่ง</div>
      <div className="summary-card">
        <div className="summary-title">{I.forward} สรุปการส่งต่อ</div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12,color:'var(--t2)'}}>เรื่อง</div>
          <div style={{fontSize:15,fontWeight:700,color:'var(--p)'}}>{doc.Subject}</div>
        </div>
        <div style={{fontSize:12,color:'var(--t2)',marginBottom:6,marginTop:12}}>ผู้รับ</div>
        {form.recipients.map(r=>{
          const purp=form.purposes[r]||"เพื่อทราบ";const pc=PURPOSE_COLORS[purp]||{bg:'#f1f3f4',color:'var(--t2)'};
          return(<div className="summary-item" key={r}>
            <div style={{width:28,height:28,borderRadius:'50%',background:pc.bg,color:pc.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>{r[0]}</div>
            <div style={{flex:1,fontWeight:600,fontSize:13}}>{r}</div>
            <span className="summary-badge" style={{background:pc.bg,color:pc.color}}>{purp}</span>
          </div>);
        })}
        {form.comment&&<div style={{marginTop:12}}>
          <div style={{fontSize:12,color:'var(--t2)',marginBottom:4}}>ข้อความเกษียณ</div>
          <div style={{background:'#fff',borderRadius:8,padding:10,fontSize:13,lineHeight:1.6,border:'1px solid rgba(203,213,224,.5)'}} dangerouslySetInnerHTML={{__html:form.comment}}/>
        </div>}
      </div>
    </div>}

    <div className="wiz-foot">
      <div>{step>0&&<button className="ba" onClick={()=>setStep(step-1)}>{I.back} ย้อนกลับ</button>}</div>
      <div style={{display:'flex',gap:8}}>
        <button className="ba" onClick={onClose}>ยกเลิก</button>
        {step<2?<button className="bn" onClick={()=>setStep(step+1)} disabled={form.recipients.length===0}>ถัดไป {I.chevR}</button>
        :<button className="bn btn-ack" onClick={()=>setShowConfirm(true)} disabled={saving||form.recipients.length===0}>{I.send} ยืนยันส่ง ({form.recipients.length} ท่าน)</button>}
      </div>
    </div>
    <ConfirmModal open={showConfirm} onClose={()=>setShowConfirm(false)} onConfirm={handleSave}
      title="ยืนยันการส่ง" message={`ส่งเอกสาร "${doc.Subject}" ไปยัง ${form.recipients.length} ท่าน?`}
      icon={I.send} iconType="success" confirmText="ส่งเอกสาร" confirmStyle={{background:'var(--ok)'}} loading={saving}/>
  </div>);
}

// ===== CREATE WIZARD =====
function CreateWizard({user,users,onClose,onCreated,showToast}){
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({
    docTypes:["หนังสือภายใน"],urgency:"ปกติ",confidentiality:"ปกติ",
    trackDoc:false,refCode:"",keywords:"",docYear:"2569",
    docNumber:"",subject:"",toField:"",refTo:"",content:"",footnote:"",
    recipients:[],purposes:{},
    files:[],
    requireSign:false,signBy:""
  });
  const[saving,setSaving]=useState(false);
  const[showConfirm,setShowConfirm]=useState(false);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleType=t=>upd("docTypes",form.docTypes.includes(t)?form.docTypes.filter(x=>x!==t):[...form.docTypes,t]);

  const steps=["ตั้งค่าหนังสือ","รายละเอียด","ไฟล์แนบ","ผู้รับ","ตรวจสอบ+ส่ง"];
  const signers=users.filter(u=>u.CanSign);

  const handleSave=async()=>{
    setSaving(true);
    try{
      const d=new Date();
      const tD=`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
      await apiCall({
        action:"createDocument",id:Date.now(),status:form.requireSign?"รอลงนาม":"ส่งต่อ",
        docNumber:form.docNumber,subject:form.subject,sender:user.name||user.username,date:tD,
        purpose:JSON.stringify(form.purposes),to:form.recipients.join(","),content:form.content,
        type:form.docTypes.join(","),urgency:form.urgency,confidentiality:form.confidentiality,
        signBy:form.signBy,signStatus:form.requireSign?"รอลงนาม":"",
        files:form.files.map(f=>f.name).join(",")
      });
      showToast(form.requireSign?"สร้างหนังสือสำเร็จ — ส่งไปรอลงนามแล้ว":"ส่งหนังสือสำเร็จ");
      onCreated();
    }catch{showToast("เกิดข้อผิดพลาด","err")}
    setSaving(false);setShowConfirm(false);
  };

  return(<div className="wiz">
    <div className="page-head" style={{marginBottom:12}}>
      <div><h2 style={{fontSize:20}}>สร้างหนังสือใหม่</h2><p>ระบบสร้างและส่งหนังสือราชการอิเล็กทรอนิกส์</p></div>
    </div>
    <div className="wiz-steps">
      {steps.map((s,i)=><React.Fragment key={i}>
        <div className={`wiz-step ${i===step?"active":""} ${i<step?"done":""}`} onClick={()=>{if(i<step)setStep(i)}}>
          <div className="wiz-step-num">{i<step?"✓":i+1}</div>{s}
        </div>
        {i<steps.length-1&&<span style={{color:'var(--bd)'}} key={i+'a'}>{I.chevR}</span>}
      </React.Fragment>)}
    </div>

    {/* STEP 0: Settings */}
    {step===0&&<div className="wiz-card">
      <div className="wiz-title">ตั้งค่ารูปแบบหนังสือ</div>
      <div className="wiz-row">
        <div className="fg full">
          <label>แบบหนังสือที่ใช้งาน *</label>
          {["หนังสือภายใน","แบบหนังสือบันทึกเสนองาน","แบบหนังสือนำส่ง","คำสั่ง/ประกาศ"].map(t=>
            <label key={t} className="fchk"><input type="checkbox" checked={form.docTypes.includes(t)} onChange={()=>toggleType(t)}/>{t}</label>
          )}
        </div>
        <div className="fg">
          <label>ชั้นความเร็ว</label>
          <select className="fi" value={form.urgency} onChange={e=>upd("urgency",e.target.value)}>
            <option>ปกติ</option><option>ด่วน</option><option>ด่วนมาก</option><option>ด่วนที่สุด</option>
          </select>
        </div>
        <div className="fg">
          <label>ชั้นความลับ</label>
          <select className="fi" value={form.confidentiality} onChange={e=>upd("confidentiality",e.target.value)}>
            <option>ปกติ</option><option>ลับ</option><option>ลับมาก</option><option>ลับมากที่สุด</option>
          </select>
        </div>
        <div className="fg">
          <label style={{display:'flex',alignItems:'center',gap:6}}>
            <input type="checkbox" checked={form.trackDoc} onChange={e=>upd("trackDoc",e.target.checked)} style={{width:16,height:16,accentColor:'var(--pa)'}}/>
            ติดตามเอกสาร
          </label>
        </div>
        <div className="fg">
          <label>ออกเลขของปี พ.ศ.</label>
          <select className="fi" value={form.docYear} onChange={e=>upd("docYear",e.target.value)}>
            <option>2569</option><option>2568</option>
          </select>
        </div>
        <div className="fg full">
          <label>คำช่วยในการค้นหา หรือ Keyword (ถ้ามี)</label>
          <input className="fi" placeholder="คีย์เวิร์ด คั่นด้วยช่องว่าง เช่น ประชุม อบรม" value={form.keywords} onChange={e=>upd("keywords",e.target.value)}/>
        </div>
      </div>
    </div>}

    {/* STEP 1: Details */}
    {step===1&&<div className="wiz-card">
      <div className="wiz-title">ส่วนหัวของหนังสือ — รายละเอียด</div>
      <div className="wiz-row">
        <div className="fg">
          <label>ส่วนงาน</label>
          <input className="fi" value="โรงเรียนป่าก้าง" readOnly style={{background:'#f0f2f5'}}/>
        </div>
        <div className="fg">
          <label>ที่ (เลขที่หนังสือ)</label>
          <input className="fi" placeholder="เช่น ศธ 04285.01/001" value={form.docNumber} onChange={e=>upd("docNumber",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>เรื่อง *</label>
          <input className="fi" placeholder="ระบุหัวข้อเรื่อง" value={form.subject} onChange={e=>upd("subject",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>เรียน</label>
          <input className="fi" placeholder="ระบุผู้รับตามเอกสาร เช่น ผู้อำนวยการโรงเรียนป่าก้าง" value={form.toField} onChange={e=>upd("toField",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>อ้างถึง (ถ้ามี)</label>
          <input className="fi" placeholder="ระบุเอกสารอ้างถึง" value={form.refTo} onChange={e=>upd("refTo",e.target.value)}/>
        </div>
      </div>
      <div className="fg full" style={{marginTop:12}}>
        <label>ส่วนเนื้อหา</label>
        <RichEditor value={form.content} onChange={v=>upd("content",v)} placeholder="ระบุรายละเอียดเนื้อหาหนังสือ..."/>
      </div>
      <div className="fg full" style={{marginTop:12}}>
        <label>ส่วนท้ายของหนังสือ (ถ้ามี)</label>
        <RichEditor value={form.footnote} onChange={v=>upd("footnote",v)} placeholder="หมายเหตุท้ายเอกสาร..."/>
      </div>
      
      {/* Signing option */}
      <div style={{background:'#fffbeb',border:'1px solid #fef3c7',borderRadius:10,padding:16,marginTop:16}}>
        <label className="fchk" style={{marginBottom:8}}>
          <input type="checkbox" checked={form.requireSign} onChange={e=>upd("requireSign",e.target.checked)}/>
          <span style={{fontWeight:600,color:'#92400e'}}>{I.sign} ต้องการให้ผู้มีอำนาจลงนาม</span>
        </label>
        {form.requireSign&&<div style={{marginTop:8}}>
          <label style={{fontSize:13,fontWeight:600,color:'var(--t2)',marginBottom:6,display:'block'}}>เลือกผู้ลงนาม</label>
          <select className="fi" value={form.signBy} onChange={e=>upd("signBy",e.target.value)}>
            <option value="">-- เลือกผู้ลงนาม --</option>
            {signers.map(s=><option key={s.Username} value={s.FullName}>{s.FullName} ({s.SignTitle})</option>)}
          </select>
          <div style={{fontSize:12,color:'var(--t3)',marginTop:4}}>
            หนังสือจะถูกส่งไปรอลงนามก่อน จากนั้นจึงส่งต่อไปยังผู้รับ
          </div>
        </div>}
      </div>
    </div>}

    {/* STEP 2: Files */}
    {step===2&&<div className="wiz-card">
      <div className="wiz-title">{I.clip} ไฟล์แนบ (ถ้ามี)</div>
      <p style={{fontSize:13,color:'var(--t2)',marginBottom:16}}>
        อัปโหลดไฟล์แนบที่เกี่ยวข้อง เช่น โครงการ, เอกสารประกอบ, รูปภาพ ฯลฯ
      </p>
      <FileUploadZone files={form.files} onFilesChange={f=>upd("files",f)}/>
    </div>}

    {/* STEP 3: Recipients */}
    {step===3&&<div className="wiz-card">
      <div className="wiz-title">{I.users} เลือกผู้รับและวัตถุประสงค์</div>
      <div className="fg full">
        <label>ค้นหาและเลือกรายชื่อผู้รับ</label>
        <RecipientInput users={users} selected={form.recipients}
          onAdd={u=>{if(!form.recipients.includes(u)){upd("recipients",[...form.recipients,u]);upd("purposes",{...form.purposes,[u]:"เพื่อทราบ"})}}}
          onRemove={u=>{upd("recipients",form.recipients.filter(x=>x!==u));const p={...form.purposes};delete p[u];upd("purposes",p)}}/>
      </div>
      {form.recipients.length>0&&<div className="fg full" style={{marginTop:12}}>
        <label>กำหนดวัตถุประสงค์รายบุคคล</label>
        {form.recipients.map(r=>{
          const purp=form.purposes[r]||"เพื่อทราบ";const pc=PURPOSE_COLORS[purp]||{bg:'#f1f3f4',color:'var(--t2)'};
          return(<div className="fwd-recipient-card" key={r}>
            <div className="fwd-avatar" style={{background:pc.bg,color:pc.color}}>{r[0]}</div>
            <div><div className="fwd-name">{r}</div></div>
            <select className="fwd-purpose-select" value={purp} onChange={e=>upd("purposes",{...form.purposes,[r]:e.target.value})}>
              {PURPOSE_OPTIONS.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>);
        })}
      </div>}
    </div>}

    {/* STEP 4: Review */}
    {step===4&&<div className="wiz-card">
      <div className="wiz-title">{I.eye} ตรวจสอบก่อนส่ง</div>
      <div className="summary-card">
        <div className="summary-title">{I.file} สรุปหนังสือ</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:14}}>
          <div><div style={{fontSize:11,color:'var(--t2)'}}>เลขที่</div><div style={{fontWeight:600,fontSize:13}}>{form.docNumber||'-'}</div></div>
          <div><div style={{fontSize:11,color:'var(--t2)'}}>ประเภท</div><div style={{fontWeight:600,fontSize:13}}>{form.docTypes.join(', ')}</div></div>
          <div><div style={{fontSize:11,color:'var(--t2)'}}>ชั้นความเร็ว</div>
            <span className="summary-badge" style={{...(URGENCY_COLORS[form.urgency]||{}),marginTop:2}}>{form.urgency}</span>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:'var(--t2)',marginBottom:2}}>เรื่อง</div>
          <div style={{fontSize:15,fontWeight:700,color:'var(--p)'}}>{form.subject}</div>
        </div>
        {form.requireSign&&form.signBy&&<div style={{background:'#fef9c3',borderRadius:8,padding:10,fontSize:13,color:'#92400e',fontWeight:500,marginTop:10,display:'flex',alignItems:'center',gap:6}}>
          {I.sign} ส่งลงนามโดย: {form.signBy}
        </div>}
        {form.files.length>0&&<div style={{marginTop:10}}>
          <div style={{fontSize:11,color:'var(--t2)',marginBottom:4}}>ไฟล์แนบ ({form.files.length} ไฟล์)</div>
          {form.files.map((f,i)=><span key={i} className="summary-badge" style={{background:'var(--ps)',color:'var(--p)',marginRight:4,marginBottom:4}}>{I.clip} {f.name}</span>)}
        </div>}
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:6,marginTop:12}}>ผู้รับ</div>
        {form.recipients.map(r=>{
          const purp=form.purposes[r]||"เพื่อทราบ";const pc=PURPOSE_COLORS[purp]||{bg:'#f1f3f4',color:'var(--t2)'};
          return(<div className="summary-item" key={r}>
            <div style={{width:26,height:26,borderRadius:'50%',background:pc.bg,color:pc.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:11,flexShrink:0}}>{r[0]}</div>
            <div style={{flex:1,fontWeight:600,fontSize:13}}>{r}</div>
            <span className="summary-badge" style={{background:pc.bg,color:pc.color}}>{purp}</span>
          </div>);
        })}
      </div>
    </div>}

    <div className="wiz-foot">
      <div>{step>0&&<button className="ba" onClick={()=>setStep(step-1)}>{I.back} ย้อนกลับ</button>}</div>
      <div style={{display:"flex",gap:8}}>
        <button className="ba" onClick={onClose}>ยกเลิก</button>
        {step<4?<button className="bn" onClick={()=>setStep(step+1)} disabled={step===1&&!form.subject.trim()}>ถัดไป {I.chevR}</button>
        :<button className="bn btn-ack" onClick={()=>setShowConfirm(true)} disabled={saving||form.recipients.length===0}>
          {I.send} {form.requireSign?"ส่งไปรอลงนาม":"ยืนยันส่งหนังสือ"} ({form.recipients.length} ท่าน)
        </button>}
      </div>
    </div>
    <ConfirmModal open={showConfirm} onClose={()=>setShowConfirm(false)} onConfirm={handleSave}
      title={form.requireSign?"ส่งหนังสือไปรอลงนาม":"ยืนยันการส่งหนังสือ"}
      message={form.requireSign?`หนังสือจะถูกส่งไปยัง ${form.signBy} เพื่อลงนาม จากนั้นจะส่งต่อไปยังผู้รับ ${form.recipients.length} ท่าน`:`ส่งหนังสือ "${form.subject}" ไปยัง ${form.recipients.length} ท่าน?`}
      icon={form.requireSign?I.sign:I.send} iconType={form.requireSign?"sign":"success"}
      confirmText={form.requireSign?"ส่งไปรอลงนาม":"ส่งหนังสือ"} confirmStyle={{background:form.requireSign?'#d69e2e':'var(--ok)'}} loading={saving}/>
  </div>);
}

  const thisMonth=docs.filter(d=>{const parts=(d.Date||"").split("/");return parts.length===3}).length;
  
  const byType={};docs.forEach(d=>{const t=d.Type||"อื่นๆ";byType[t]=(byType[t]||0)+1});
  
  return(<div>
    <div className="page-head"><div><h2>สถิติเอกสาร</h2><p>ภาพรวมระบบจัดการเอกสารอิเล็กทรอนิกส์</p></div></div>

        <div className="stat-num">{total}</div>
        <div className="stat-label">เอกสารทั้งหมด</div>
      </div>
      <div className="stat-card">
        <div className="stat-icon" style={{background:'var(--os)',color:'var(--ok)'}}>{I.check}</div>
        <div className="stat-num" style={{color:'var(--ok)'}}>{signed}</div>
        <div className="stat-label">ลงนามแล้ว</div>
      </div>
      <div className="stat-card">
        <div className="stat-icon" style={{background:'#fef9c3',color:'#d69e2e'}}>{I.sign}</div>
        <div className="stat-num" style={{color:'#d69e2e'}}>{pending}</div>
        <div className="stat-label">รอลงนาม</div>
      </div>
      <div className="stat-card">
        <div className="stat-icon" style={{background:'#fce8e6',color:'var(--dn)'}}>{I.pending}</div>
        <div className="stat-num" style={{color:'var(--dn)'}}>{docs.filter(d=>!d.ReadBy).length}</div>

          <td><div style={{background:'var(--ps)',borderRadius:20,height:8,width:200,overflow:'hidden'}}>

          </div></td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

// ===== SIGNING PAGE =====
function SigningPage({user,docs,users,onSign,showToast}){
  const[sel,sSel]=useState(null);
  const[signModal,setSignModal]=useState(false);
  const[signing,setSigning]=useState(false);
  const[signComment,setSignComment]=useState("");

  const myDocs=docs.filter(d=>d.SignStatus==="รอลงนาม"&&(d.SignBy||d.signBy||"")===(user.name||user.username));
  const userInfo=users.find(u=>(u.FullName||u.Username)===(user.name||user.username));
  const signTitle=userInfo?.SignTitle||user.role;

  const handleSign=async()=>{
    setSigning(true);
    setTimeout(()=>{
      onSign(sel,signComment,signTitle);
      showToast("ลงนามเอกสารสำเร็จ");
      setSigning(false);setSignModal(false);sSel(null);setSignComment("");
    },1000);
  };

  if(sel)return(<div className="det">
    <div className="deth"><button className="detbk" onClick={()=>sSel(null)}>{I.back}</button><div><h2 style={{fontSize:20,color:'var(--p)'}}>{sel.Subject}</h2><div style={{color:'var(--t2)',fontSize:13}}>เลขที่: {sel.DocNumber||"-"}</div></div></div>
    <div className="detc">
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <span className="status-pill status-sign">{I.sign} รอลงนาม</span>
        {sel.Urgency&&sel.Urgency!=="ปกติ"&&<span className="status-pill" style={{...(URGENCY_COLORS[sel.Urgency]||{})}}>{sel.Urgency}</span>}
      </div>
      <div className="detg">
        <div><div className="detfl">ผู้ส่ง</div><div className="detfp">{sel.Sender}</div></div>
        <div><div className="detfl">วันที่</div><div className="detfp">{sel.Date}</div></div>
        <div><div className="detfl">ผู้รับ</div><div className="detfp">{sel.To}</div></div>
        <div><div className="detfl">วัตถุประสงค์</div><div className="detfp" style={{color:'var(--dn)'}}>{getAllPurposes(sel.Purpose)}</div></div>
      </div>
      <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--bd)'}}>
        <div className="detfl">เนื้อหา</div>
        <div className="detcn" dangerouslySetInnerHTML={{__html:sel.Content||'ไม่มีเนื้อหา'}}/>
      </div>
      {sel.Files&&sel.Files.length>0&&<div style={{marginTop:16}}>
        <div className="detfl">ไฟล์แนบ</div>
        <div className="file-list">{sel.Files.map((f,i)=>{
          const ext=getFileExt(f);
          return <div className="file-item" key={i}><div className={`file-icon file-${ext}`}>{ext.toUpperCase()}</div><div style={{flex:1,fontWeight:600,fontSize:13}}>{f}</div><button className="ba" style={{padding:'6px 12px',fontSize:12}}>{I.download} ดาวน์โหลด</button></div>
        })}</div>
      </div>}
      <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--bd)'}}>
        <div className="detfl">ลำดับการรับ-ส่ง</div>
        {renderRoutingHistory(sel.RoutingHistory)}
      </div>
      <div className="action-bar">
        <button className="bn btn-sign" onClick={()=>setSignModal(true)}>{I.sign} ลงนามเอกสาร</button>
        <button className="bn btn-rep" onClick={()=>showToast("ส่งกลับเพื่อแก้ไข","warn")}>{I.reply} ส่งกลับแก้ไข</button>
      </div>
    </div>
    <ConfirmModal open={signModal} onClose={()=>setSignModal(false)} onConfirm={handleSign}
      title="ลงนามเอกสาร" icon={I.sign} iconType="sign" confirmText="ยืนยันลงนาม" confirmStyle={{background:'#d69e2e'}} loading={signing}
      message={<div>
        <p style={{marginBottom:12}}>ลงนามเอกสาร "{sel.Subject}" ในฐานะ</p>
        <div style={{background:'#fef9c3',borderRadius:8,padding:12,fontWeight:600,color:'#92400e',fontSize:14,marginBottom:12}}>{signTitle}</div>
        <label style={{fontSize:13,fontWeight:600,color:'var(--t2)',display:'block',marginBottom:6}}>ข้อความกำกับ (ถ้ามี)</label>
        <textarea className="fi" style={{minHeight:60,resize:'vertical'}} placeholder="เช่น อนุมัติ, เห็นชอบ..." value={signComment} onChange={e=>setSignComment(e.target.value)}/>
      </div>}/>
  </div>);

  return(<div>
    <div className="page-head"><div><h2>เอกสารรอลงนาม</h2><p>เอกสารที่รอการลงนามจากท่าน</p></div></div>
    {myDocs.length>0?<div className="tc">
      <div className="tch"><div className="tct">รายการรอลงนาม ({myDocs.length})</div></div>
      <table className="dt">
        <thead><tr><th>ชั้นความเร็ว</th><th>เลขที่</th><th>เรื่อง</th><th>ผู้ส่ง</th><th>วันที่</th></tr></thead>
        <tbody>{myDocs.map((d,i)=><tr key={i} onClick={()=>sSel(d)}>
          <td><span className="status-pill" style={{...(URGENCY_COLORS[d.Urgency||"ปกติ"]||{})}}>{d.Urgency||"ปกติ"}</span></td>
          <td style={{fontWeight:600}}>{d.DocNumber||"-"}</td>
          <td><div className="ds">{d.Subject}</div></td>
          <td style={{fontSize:13}}>{d.Sender}</td>
          <td style={{fontSize:13}}>{d.Date}</td>
        </tr>)}</tbody>
      </table>
    </div>:<div className="tc"><div className="emp"><div className="emp-i">✅</div><div className="emp-t">ไม่มีเอกสารรอลงนาม</div></div></div>}
  </div>);
}

      <div style={{padding:20}}>
        {[
          {role:"ผู้อำนวยการ",perms:["ดูเอกสารทั้งหมด","ลงนามเอกสาร","อนุมัติโครงการ","มอบหมายรักษาการ"],color:"#c53030"},

          {role:"สารบรรณ",perms:["สร้างหนังสือ","ออกเลขที่","จัดการเอกสาร","ดูสถิติ","ค้นหาทั้งหมด"],color:"#3182ce"},
          {role:"ครู / เจ้าหน้าที่",perms:["ดูเอกสารที่ได้รับเท่านั้น","รับทราบ","ส่งต่อ","ตอบกลับ"],color:"#2f855a"},
          {role:"PR (ประชาสัมพันธ์)",perms:["รับงานจัดทำสื่อ","ดูเอกสารที่ได้รับ","อัปโหลดผลงาน","แจ้งสถานะงาน"],color:"#805ad5"},

    {tab==="signers"&&<div className="tc">

// ===== MAIN APP =====
function App(){
  // Demo: pick a user
  const[loginUser,setLoginUser]=useState(null);
  const[pg,sPg]=useState("inbox");
  const[docs,sDocs]=useState(DEMO_DOCS);
  const[sel,sSel]=useState(null);
  const[toast,sToast]=useState(null);
  const[sq,sSq]=useState("");
  const[fwdMode,setFwdMode]=useState(null);
  const[recallModal,setRecallModal]=useState(null);
  const[recalling,setRecalling]=useState(false);
  const[recallReason,setRecallReason]=useState("");

  const users=DEMO_USERS;
  const tt=(m,t="ok")=>{sToast({m,t});setTimeout(()=>sToast(null),3000)};

  const cu=loginUser;
  const curUserInfo=users.find(u=>u.Username===cu?.username);

  // LOGIN SCREEN
  if(!cu) return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1e3a5f 0%,#2c5282 50%,#1e3a5f 100%)'}}>
      <style>{CSS}</style>
      <div style={{background:'#fff',borderRadius:16,padding:36,width:420,maxWidth:'95%',boxShadow:'0 20px 60px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:32,marginBottom:8}}>🏫</div>
          <div style={{fontSize:20,fontWeight:700,color:'var(--p)'}}>ระบบจัดการเอกสารอิเล็กทรอนิกส์</div>
          <div style={{fontSize:14,color:'var(--t2)',marginTop:4}}>โรงเรียนป่าก้าง</div>
        </div>
        <div style={{fontSize:13,fontWeight:600,color:'var(--t2)',marginBottom:10}}>เลือกบัญชีเพื่อเข้าสู่ระบบ (Demo)</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {users.map(u=><button key={u.Username} className="ba" style={{justifyContent:'flex-start',textAlign:'left',padding:'12px 16px'}}
            onClick={()=>setLoginUser({username:u.Username,name:u.FullName,role:u.Role})}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'var(--ps)',color:'var(--pa)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,flexShrink:0}}>{u.FullName[0]}</div>
            <div style={{marginLeft:4}}>
              <div style={{fontWeight:600,fontSize:14}}>{u.FullName}</div>
              <div style={{fontSize:11,color:'var(--t3)'}}>{u.Position}</div>
            </div>
            {u.CanSign&&<span style={{marginLeft:'auto',fontSize:10,background:'#fef9c3',color:'#a16207',padding:'2px 6px',borderRadius:6,fontWeight:600}}>ลงนามได้</span>}
          </button>)}
        </div>
      </div>
    </div>
  );

  const canManageDocs=cu.role==="ผู้ดูแลระบบ"||cu.role==="สารบรรณ"||cu.role==="ผู้อำนวยการ"||cu.role==="รองผู้อำนวยการ";
  const isSysAdmin=cu.role==="ผู้ดูแลระบบ"||cu.role==="ผู้อำนวยการ";
  const canSign=curUserInfo?.CanSign||false;

  const isDocRead=(d)=>{if(!d.ReadBy)return false;const r=String(d.ReadBy);return r.includes(cu.username)||(cu.name&&r.includes(cu.name))};
  const isDocRecalled=(d)=>d.Status==="ดึงคืน";
  const isDocSentByMe=(d)=>d.Sender===cu.username||d.Sender===cu.name;

  const myInbox=docs.filter(d=>{if(!d.To)return false;const t=String(d.To);return t.includes(cu.username)||(cu.name&&t.includes(cu.name))});
  const ic=myInbox.filter(d=>!isDocRead(d)&&!isDocRecalled(d)).length;
  const cntSign=docs.filter(d=>d.SignStatus==="รอลงนาม"&&(d.SignBy||d.signBy||"")===cu.name).length;
  const fD=myInbox.filter(d=>{const q=sq.toLowerCase();return!q||(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q)});
  const myOutbox=docs.filter(d=>isDocSentByMe(d));

  const ack=(d,cb)=>{
    if(isDocRead(d)){cb?.();return}
    const newRB=d.ReadBy?(d.ReadBy+", "+cu.name):cu.name;
    const updated=docs.map(x=>x.id===d.id?{...x,ReadBy:newRB}:x);
    sDocs(updated);
    if(sel&&sel.id===d.id)sSel({...d,ReadBy:newRB});
    tt("รับทราบแล้ว");cb?.();
  };

  const handleSign=(doc,comment,signTitle)=>{
    const tD=thDate(new Date());
    const hist=doc.RoutingHistory?JSON.parse(doc.RoutingHistory):[];
    hist.push({type:"sign",from:cu.name,date:tD,comment:comment||"ลงนามอนุมัติ"});
    const updated=docs.map(d=>d.id===doc.id?{...d,SignStatus:"ลงนามแล้ว",SignedBy:cu.name,SignDate:tD,SignTitle:signTitle,Status:"ลงนามแล้ว",RoutingHistory:JSON.stringify(hist)}:d);
    sDocs(updated);
  };

  const handleRecall=()=>{
    if(!recallModal)return;
    const tD=thDate(new Date());
    const hist=recallModal.RoutingHistory?JSON.parse(recallModal.RoutingHistory):[];
    hist.push({type:"recall",from:cu.name,to:recallModal.To,date:tD,comment:recallReason||"ดึงหนังสือคืน"});
    const updated=docs.map(d=>d.id===recallModal.id?{...d,Status:"ดึงคืน",RoutingHistory:JSON.stringify(hist)}:d);
    sDocs(updated);tt("ดึงหนังสือคืนสำเร็จ");
    setRecallModal(null);setRecallReason("");sSel(null);
  };

  const selIsRead=sel?isDocRead(sel):false;
  const selIsRecalled=sel?isDocRecalled(sel):false;
  const selIsMine=sel?isDocSentByMe(sel):false;

  return(<div className="app"><style>{CSS}</style>
    <header className="top">
      <div className="top-l" onClick={()=>{sPg("inbox");sSel(null);setFwdMode(null)}}>
        <div className="logo-box">🏫</div>
        <div><div className="top-title">ระบบจัดการเอกสารอิเล็กทรอนิกส์</div><div className="top-sub">โรงเรียนป่าก้าง — e-Document System</div></div>
      </div>
      <div className="top-r">
        {cntSign>0&&<div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(214,158,46,.2)',padding:'6px 12px',borderRadius:8,cursor:'pointer'}} onClick={()=>{sPg("signing");sSel(null);setFwdMode(null)}}>
          {I.sign}<span style={{fontWeight:600,fontSize:13}}>รอลงนาม {cntSign}</span>
        </div>}
        <div className="u-info"><div className="u-name">{cu.name}</div><div className="u-role">{curUserInfo?.Position||cu.role}</div></div>
        <button className="btn-logout" onClick={()=>setLoginUser(null)}>ออกจากระบบ</button>
      </div>
    </header>
    <div className="main-body">
      <aside className="sb">
        <SB pg={pg} nav={p=>{sPg(p);sSel(null);setFwdMode(null)}} user={cu} cnt={ic} cntSign={cntSign} canManageDocs={canManageDocs} isSysAdmin={isSysAdmin} canSign={canSign}/>
      </aside>
      <main className="mn">
        {/* Forward/Reply Wizard */}
        {fwdMode&&sel?<ForwardWizard user={cu} users={users} doc={sel} isReply={fwdMode==="reply"} onClose={()=>setFwdMode(null)} onForwarded={()=>{setFwdMode(null);sSel(null)}} showToast={tt}/>

        /* Detail View */
        :sel?<div className="det">
          <div className="deth"><button className="detbk" onClick={()=>sSel(null)}>{I.back}</button>
            <div><h2 style={{fontSize:20,color:'var(--p)'}}>{sel.Subject}</h2><div style={{color:'var(--t2)',fontSize:13}}>เลขที่: {sel.DocNumber||"-"}</div></div>
          </div>
          <div className="detc">
            {selIsRecalled&&<div className="recall-banner">{I.recall} เอกสารนี้ถูกดึงคืนโดยผู้ส่ง</div>}
            <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
              {selIsRecalled?<span className="status-pill status-danger">{I.recall} ดึงคืน</span>
              :sel.SignStatus==="ลงนามแล้ว"?<span className="status-pill status-success">{I.check} ลงนามแล้ว</span>
              :sel.SignStatus==="รอลงนาม"?<span className="status-pill status-sign">{I.sign} รอลงนาม</span>
              :selIsRead?<span className="status-pill status-success">{I.check} รับทราบแล้ว</span>
              :<span className="status-pill status-wait">รอรับทราบ</span>}
              {sel.Urgency&&sel.Urgency!=="ปกติ"&&<span className="status-pill" style={{...(URGENCY_COLORS[sel.Urgency]||{})}}>{sel.Urgency}</span>}
              {sel.Confidentiality&&sel.Confidentiality!=="ปกติ"&&<span className="status-pill" style={{...(CONF_COLORS[sel.Confidentiality]||{})}}>{I.shield} {sel.Confidentiality}</span>}
            </div>
            <div className="detg">
              <div><div className="detfl">ผู้ส่ง</div><div className="detfp">{sel.Sender}</div></div>
              <div><div className="detfl">วันที่</div><div className="detfp">{sel.Date}</div></div>
              <div><div className="detfl">วัตถุประสงค์</div><div className="detfp" style={{color:'var(--dn)',fontSize:13}}>{getAllPurposes(sel.Purpose)}</div></div>
              <div><div className="detfl">ผู้รับทราบ</div><div className="detfp" style={{fontSize:12,color:'var(--t2)'}}>{sel.ReadBy||'ยังไม่มี'}</div></div>
            </div>
            <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--bd)'}}>
              <div className="detfl">เนื้อหา</div>
              <div className="detcn" dangerouslySetInnerHTML={{__html:sel.Content||'ไม่มีเนื้อหา'}}/>
            </div>

            {/* Files */}
            {sel.Files&&sel.Files.length>0&&<div style={{marginTop:16}}>
              <div className="detfl">ไฟล์แนบ ({sel.Files.length} ไฟล์)</div>
              <div className="file-list">{sel.Files.map((f,i)=>{
                const ext=getFileExt(f);
                return <div className="file-item" key={i}>
                  <div className={`file-icon file-${ext}`}>{ext.toUpperCase()}</div>
                  <div style={{flex:1,fontWeight:600,fontSize:13}}>{f}</div>
                  <button className="ba" style={{padding:'5px 10px',fontSize:12}}>{I.eye} ดู</button>
                  <button className="ba" style={{padding:'5px 10px',fontSize:12}}>{I.download} โหลด</button>
                </div>
              })}</div>
            </div>}

            {/* Signature */}
            {sel.SignedBy&&<div style={{marginTop:16}}>
              <div className="detfl">การลงนาม</div>
              <SignatureBlock signedBy={sel.SignedBy} signDate={sel.SignDate} signTitle={sel.SignTitle}/>
            </div>}

            {/* Routing History */}
            <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--bd)'}}>
              <div className="detfl">{I.route} ลำดับการรับ-ส่ง / เกษียณหนังสือ</div>
              {renderRoutingHistory(sel.RoutingHistory)}
            </div>

            {!selIsRecalled&&<div className="action-bar">
              {!selIsRead&&<button className="bn btn-ack" onClick={()=>ack(sel)}>{I.check} รับทราบ</button>}
              <button className="bn btn-fwd" onClick={()=>{ack(sel,()=>setFwdMode("forward"))}}>{I.forward} {selIsRead?'ส่งต่อ':'รับทราบ+ส่งต่อ'}</button>
              <button className="bn btn-rep" onClick={()=>{ack(sel,()=>setFwdMode("reply"))}}>{I.reply} {selIsRead?'ตอบกลับ':'รับทราบ+ตอบกลับ'}</button>
              {selIsMine&&<button className="bn btn-recall" onClick={()=>{setRecallReason("");setRecallModal(sel)}}>{I.recall} ดึงคืน</button>}
            </div>}
          </div>
        </div>

        /* CREATE */
        :pg==="create"?<CreateWizard user={cu} users={users} onClose={()=>sPg("inbox")} onCreated={()=>sPg("inbox")} showToast={tt}/>

        /* SIGNING */
        :pg==="signing"&&canSign?<SigningPage user={cu} docs={docs} users={users} onSign={handleSign} showToast={tt}/>

        /* STATS */
        :pg==="stats"?<StatsPage docs={docs}/>

        /* SETTINGS */
        :pg==="settings"?<SettingsPage users={users} showToast={tt}/>

        /* INBOX */
        :pg==="inbox"?<div>
          <div className="page-head">
            <div><h2>เอกสารเข้า</h2><p>เอกสารที่ส่งถึงท่าน — คลิกเพื่อดูรายละเอียดและดำเนินการ</p></div>
            {canManageDocs&&<button className="bn" onClick={()=>{setFwdMode(null);sSel(null);sPg("create")}}>{I.plus} สร้างหนังสือใหม่</button>}
          </div>
          <div className="tc">
            <div className="tch"><div className="tct">กล่องขาเข้า ({fD.length})</div><div className="sbx">{I.search}<input placeholder="ค้นหาเรื่อง..." value={sq} onChange={e=>sSq(e.target.value)}/></div></div>
            {fD.length>0?<table className="dt">
              <thead><tr><th style={{width:'12%'}}>สถานะ</th><th style={{width:'15%'}}>เลขที่</th><th style={{width:'40%'}}>เรื่อง</th><th style={{width:'15%'}}>ผู้ส่ง</th><th style={{width:'8%'}}>แนบ</th><th style={{width:'10%'}}>ลงนาม</th></tr></thead>
              <tbody>{fD.map((d,i)=>{
                const isR=isDocRead(d);const recalled=isDocRecalled(d);
                return <tr key={i} onClick={()=>sSel(d)} style={recalled?{opacity:.5}:{}}>
                  <td>{recalled?<span className="status-pill status-danger">ดึงคืน</span>:isR?<span className="status-pill status-success">ทราบแล้ว</span>:<span className="status-pill status-wait">รอรับทราบ</span>}</td>
                  <td style={{fontWeight:600,fontSize:13}}>{d.DocNumber||"-"}</td>
                  <td>
                    <div className="ds">{d.Subject}</div>
                    <div className="dm">
                      <span>{I.clock} {d.Date}</span>
                      {d.Urgency&&d.Urgency!=="ปกติ"&&<span className="status-pill" style={{...(URGENCY_COLORS[d.Urgency]||{}),padding:'1px 6px',fontSize:10}}>{d.Urgency}</span>}
                      {!recalled&&<span style={{color:'var(--dn)',fontSize:11}}>{I.pin} {getMyPurpose(d.Purpose,cu.name)}</span>}
                    </div>
                  </td>
                  <td style={{fontSize:13}}>{d.Sender?.split('(')[0]||'-'}</td>
                  <td>{d.Files&&d.Files.length>0&&<span style={{color:'var(--pa)'}} title={d.Files.join(', ')}>{I.clip} {d.Files.length}</span>}</td>
                  <td>{d.SignStatus==="ลงนามแล้ว"?<span className="status-pill status-success" style={{fontSize:10,padding:'2px 6px'}}>ลงนามแล้ว</span>:d.SignStatus==="รอลงนาม"?<span className="status-pill status-sign" style={{fontSize:10,padding:'2px 6px'}}>รอลงนาม</span>:<span style={{color:'var(--t3)',fontSize:11}}>-</span>}</td>
                </tr>
              })}</tbody>
            </table>:<div className="emp"><div className="emp-i">📭</div><div className="emp-t">ไม่มีเอกสารเข้าใหม่</div></div>}
          </div>
        </div>

        /* OUTBOX */
        :pg==="outbox"?<div>
          <div className="page-head">
            <div><h2>เอกสารส่งออก</h2><p>หนังสือที่ท่านเป็นผู้ส่ง</p></div>
            {canManageDocs&&<button className="bn" onClick={()=>{sPg("create")}}>{I.plus} สร้างใหม่</button>}
          </div>
          <div className="tc">
            <div className="tch"><div className="tct">รายการส่งออก ({myOutbox.length})</div></div>
            {myOutbox.length>0?<table className="dt">
              <thead><tr><th>สถานะ</th><th>เลขที่</th><th>เรื่อง</th><th>ผู้รับ</th><th>วันที่</th></tr></thead>
              <tbody>{myOutbox.map((d,i)=>{
                const recalled=isDocRecalled(d);
                return <tr key={i} onClick={()=>sSel(d)} style={recalled?{opacity:.5}:{}}>
                  <td>{recalled?<span className="status-pill status-danger">ดึงคืน</span>:d.SignStatus==="ลงนามแล้ว"?<span className="status-pill status-success">ลงนามแล้ว</span>:d.SignStatus==="รอลงนาม"?<span className="status-pill status-sign">รอลงนาม</span>:<span className="status-pill status-info">ส่งแล้ว</span>}</td>
                  <td style={{fontWeight:600,fontSize:13}}>{d.DocNumber||"-"}</td>
                  <td><div className="ds">{d.Subject}</div></td>
                  <td style={{fontSize:12}}>{(d.To||"").split(',').length>1?(d.To.split(',')[0]+' +'+(d.To.split(',').length-1)):d.To}</td>
                  <td style={{fontSize:12}}>{d.Date}</td>
                </tr>
              })}</tbody>
            </table>:<div className="emp"><div className="emp-i">📤</div><div className="emp-t">ยังไม่มีประวัติส่งออก</div></div>}
          </div>
        </div>

        /* ALL DOCS */
        :pg==="all_docs"?<div>
          <div className="page-head"><div><h2>เอกสารทั้งหมด</h2><p>เอกสารทั้งหมดในระบบ (สำหรับสารบรรณ/ผู้บริหาร)</p></div></div>
          <div className="tc">
            <div className="tch"><div className="tct">ทั้งหมด ({docs.length} ฉบับ)</div><div className="sbx">{I.search}<input placeholder="ค้นหา..." value={sq} onChange={e=>sSq(e.target.value)}/></div></div>
            <table className="dt">
              <thead><tr><th>สถานะ</th><th>เลขที่</th><th>เรื่อง</th><th>ผู้ส่ง</th><th>ผู้รับ</th><th>ลงนาม</th></tr></thead>
              <tbody>{docs.filter(d=>{const q=sq.toLowerCase();return!q||(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q)}).map((d,i)=><tr key={i} onClick={()=>sSel(d)}>
                <td>{d.Status==="ดึงคืน"?<span className="status-pill status-danger">ดึงคืน</span>:<span className="status-pill status-info">{d.Status||"ส่งแล้ว"}</span>}</td>
                <td style={{fontWeight:600,fontSize:12}}>{d.DocNumber||"-"}</td>
                <td><div className="ds" style={{fontSize:13}}>{d.Subject}</div><div style={{fontSize:11,color:'var(--t3)'}}>{d.Date}</div></td>
                <td style={{fontSize:12}}>{d.Sender}</td>
                <td style={{fontSize:11,color:'var(--t2)'}}>{(d.To||"").substring(0,30)}{(d.To||"").length>30?'...':''}</td>
                <td>{d.SignStatus==="ลงนามแล้ว"?<span className="status-pill status-success" style={{fontSize:10,padding:'2px 6px'}}>✓</span>:d.SignStatus==="รอลงนาม"?<span className="status-pill status-sign" style={{fontSize:10,padding:'2px 6px'}}>รอ</span>:'-'}</td>
              </tr>)}</tbody>
            </table>
          </div>
        </div>

        /* SEARCH */
        :pg==="search"?<div>
          <div className="page-head"><div><h2>ค้นหาเอกสาร</h2><p>ค้นหาจากเลขที่ ชื่อเรื่อง หรือชื่อผู้ส่ง</p></div></div>
          <div className="tc">
            <div style={{padding:16}}><div className="sbx" style={{background:'#fff',border:'1px solid var(--bd)'}}>{I.search}<input placeholder="พิมพ์คำค้นหา..." value={sq} onChange={e=>sSq(e.target.value)} style={{fontSize:14,width:'100%'}}/></div></div>
            {sq.trim()?<table className="dt">
              <thead><tr><th>เลขที่</th><th>เรื่อง</th><th>ผู้ส่ง</th><th>วันที่</th></tr></thead>
              <tbody>{docs.filter(d=>{const q=sq.toLowerCase();return(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q)||(d.Sender||"").toLowerCase().includes(q)}).map((d,i)=><tr key={i} onClick={()=>sSel(d)}>
                <td style={{fontWeight:600,fontSize:13}}>{d.DocNumber||"-"}</td>
                <td><div className="ds" style={{fontSize:14}}>{d.Subject}</div></td>
                <td style={{fontSize:13}}>{d.Sender}</td>
                <td style={{fontSize:13}}>{d.Date}</td>
              </tr>)}</tbody>
            </table>:<div className="emp"><div className="emp-i">🔍</div><div className="emp-t">พิมพ์คำค้นหาเพื่อเริ่มค้นหา</div></div>}
          </div>
        </div>

        :<div className="emp"><div className="emp-i">🚧</div><div className="emp-t" style={{color:'var(--p)',fontSize:18}}>กำลังพัฒนา</div><p style={{fontSize:13,color:'var(--t2)',marginTop:6}}>ฟังก์ชันนี้จะเปิดให้ใช้งานเร็วๆ นี้</p></div>}
      </main>
    </div>

    {toast&&<div className={`toast toast-${toast.t}`}>{toast.t==="ok"?I.check:"⚠"} {toast.m}</div>}

    {/* RECALL MODAL */}
    {recallModal&&<div className="modal-overlay" onClick={()=>setRecallModal(null)}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><div className="modal-icon danger">{I.recall}</div><div><div style={{fontSize:16,fontWeight:700}}>ดึงหนังสือคืน</div><div style={{fontSize:13,color:'var(--t2)',marginTop:2}}>เรื่อง: {recallModal.Subject}</div></div></div>
        <div className="modal-body">
          <p style={{marginBottom:12}}>ผู้รับจะไม่สามารถดำเนินการกับเอกสารนี้ได้อีก</p>
          <label style={{fontSize:13,fontWeight:600,color:'var(--t2)',display:'block',marginBottom:6}}>เหตุผล (ไม่บังคับ)</label>
          <textarea className="fi" style={{minHeight:60,resize:'vertical'}} placeholder="เช่น ส่งผิด, ข้อมูลไม่ถูกต้อง..." value={recallReason} onChange={e=>setRecallReason(e.target.value)}/>
        </div>
        <div className="modal-foot">
          <button className="ba" onClick={()=>setRecallModal(null)}>ยกเลิก</button>
          <button className="bn btn-recall" onClick={handleRecall}>{I.recall} ยืนยันดึงคืน</button>
        </div>
      </div>
    </div>}
  </div>);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
