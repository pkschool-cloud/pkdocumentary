async function apiCall(params) {
  try {
    const qs = new URLSearchParams(params).toString();
    const r = await fetch(`${API}?${qs}`, { method: "GET", redirect: "follow" });
    return await r.json();
  } catch {
    try {
      const r = await fetch(API, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(params) });
      return await r.json();
    } catch (e2) { return { success: false, error: e2.message }; }
  }
}

.detbk{width:38px;height:38px;border-radius:9px;border:1px solid var(--bd);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:2px}
.detbk:hover{background:var(--ps);color:var(--p);border-color:var(--p)}
.detc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.detp{padding:22px;border-bottom:1px solid var(--bd)}
.detg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.detfl{font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.detfp{font-size:13px;margin-top:3px;font-weight:500}
.detb{padding:22px}
.detcn{background:#f8fafc;border:1px solid var(--bd);border-radius:8px;padding:18px;line-height:1.8;font-size:13px}
.deta{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.ba{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;border:1px solid var(--bd);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--f)}
.ba:hover{border-color:var(--p);color:var(--p);background:var(--ps)}
.ba.gr{background:var(--ok);color:#fff;border-color:var(--ok)}.ba.gr:hover{background:#059669}
.ba.bl{background:var(--p);color:#fff;border-color:var(--p)}.ba.bl:hover{background:var(--ph)}
.trk{padding:22px;border-top:1px solid var(--bd)}
.trki{display:flex;gap:14px;padding:12px 0;position:relative}
.trkd{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;z-index:1}
.trkl{position:absolute;left:4px;top:18px;bottom:-12px;width:2px;background:var(--bd)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.09);z-index:9999;animation:slideUp .3s;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:#fff}
.toast-ok{background:var(--ok)}.toast-err{background:var(--dn)}

/* ═══ CREATE WIZARD ═══ */
.wiz{animation:fadeUp .3s}
.wiz-steps{display:flex;align-items:center;margin-bottom:24px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 20px;gap:4px;flex-wrap:wrap}
.wiz-step{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;transition:all .2s;white-space:nowrap}
.wiz-step.active{background:var(--p);color:#fff;font-weight:600}
.wiz-step.done{color:var(--ok);font-weight:600}
.wiz-step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bd);flex-shrink:0}
.wiz-step.active .wiz-step-num{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.2);color:#fff}
.wiz-step.done .wiz-step-num{border-color:var(--ok);background:var(--os);color:var(--ok)}
.wiz-sep{color:var(--bd);flex-shrink:0}
.wiz-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:28px;animation:fadeUp .3s}
.wiz-title{font-size:16px;font-weight:700;color:var(--t);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--ps)}
.wiz-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.wiz-row{grid-template-columns:1fr}.detg{grid-template-columns:1fr}}
.fg{margin-bottom:16px}.fg.full{grid-column:1/-1}
.fg>label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
.fi{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:var(--f);transition:all .2s;background:#fff}
.fi:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.fta{min-height:120px;resize:vertical}
.fchk{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:14px;cursor:pointer;user-select:none}
.fchk input{width:18px;height:18px;accent-color:var(--p);cursor:pointer}

/* Rich editor */
.editor-wrap{border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.editor-toolbar{display:flex;gap:2px;padding:6px 8px;background:#f8fafc;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.editor-btn{width:32px;height:32px;border:none;background:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .15s}
.editor-btn:hover{background:var(--ps);color:var(--p)}
.editor-btn.active{background:var(--p);color:#fff}
.editor-body{min-height:200px;padding:14px;font-size:14px;line-height:1.8;outline:none;font-family:var(--f)}
.editor-body:empty::before{content:attr(data-placeholder);color:var(--t3)}
.editor-tabs{display:flex;border-top:1px solid var(--bd);background:#f8fafc}
.editor-tab{padding:6px 14px;font-size:12px;cursor:pointer;border:none;background:none;font-family:var(--f);color:var(--t2);transition:all .15s}
.editor-tab.active{background:#fff;font-weight:600;color:var(--t)}

/* Dropzone */
.dropzone{border:2px dashed var(--bd);border-radius:var(--r);padding:30px;text-align:center;cursor:pointer;transition:all .2s;color:var(--t3)}
.dropzone:hover{border-color:var(--p);background:var(--ps);color:var(--p)}
.dropzone.over{border-color:var(--p);background:var(--ps)}
.file-list{margin-top:10px}
.file-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8fafc;border:1px solid var(--bd);border-radius:8px;margin-top:6px;font-size:13px}
.file-item button{margin-left:auto;background:none;border:none;color:var(--dn);cursor:pointer;display:flex;padding:4px}

/* Recipient autocomplete */
.recip-wrap{position:relative}
.recip-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--bd);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.09);z-index:50;max-height:180px;overflow-y:auto;animation:fadeUp .15s}
.recip-opt{padding:10px 14px;cursor:pointer;font-size:13px;transition:all .1s;display:flex;align-items:center;gap:8px}
.recip-opt:hover{background:var(--ps);color:var(--p)}
.recip-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--ps);color:var(--p);border-radius:14px;font-size:12px;font-weight:500;margin:2px}
.recip-tag button{background:none;border:none;color:var(--p);cursor:pointer;display:flex;font-size:14px;line-height:1}

/* Wizard footer */
.wiz-foot{display:flex;justify-content:space-between;margin-top:20px;gap:10px;flex-wrap:wrap}
.wiz-foot-l{display:flex;gap:8px}
`;

function SBadge({s}){if(!s)return null;const m={"ส่งต่อ":"s","รับทราบ":"a"};return<span className={`bg bg-${m[s]||"w"}`}>{s}</span>}

/* ═══ RICH EDITOR ═══ */
function RichEditor({value,onChange,placeholder}){
  const ref=useRef();const[tab,setTab]=useState("design");
  const exec=(cmd,val)=>{document.execCommand(cmd,false,val);ref.current?.focus()};
  const handleInput=()=>{if(onChange)onChange(ref.current?.innerHTML||"")};
  return(<div className="editor-wrap">
    <div className="editor-toolbar">
      <button type="button" className="editor-btn" onClick={()=>exec("bold")} title="Bold">{I.bold}</button>
      <button type="button" className="editor-btn" onClick={()=>exec("italic")} title="Italic">{I.italic}</button>
      <button type="button" className="editor-btn" onClick={()=>exec("underline")} title="Underline">{I.underline}</button>
      <div style={{width:1,background:"var(--bd)",margin:"2px 4px"}}/>
      <select style={{border:"1px solid var(--bd)",borderRadius:4,padding:"2px 6px",fontSize:12,fontFamily:"var(--f)"}} onChange={e=>exec("fontSize",e.target.value)}>
        <option value="">ขนาด</option><option value="1">เล็ก</option><option value="3">ปกติ</option><option value="5">ใหญ่</option><option value="7">ใหญ่มาก</option>
      </select>
      <select style={{border:"1px solid var(--bd)",borderRadius:4,padding:"2px 6px",fontSize:12,fontFamily:"var(--f)"}} onChange={e=>{exec("justifyLeft");if(e.target.value==="center")exec("justifyCenter");if(e.target.value==="right")exec("justifyRight")}}>
        <option value="left">ซ้าย</option><option value="center">กลาง</option><option value="right">ขวา</option>
      </select>
    </div>
    {tab==="design"?<div ref={ref} className="editor-body" contentEditable suppressContentEditableWarning data-placeholder={placeholder||"ระบุรายละเอียด"} onInput={handleInput} dangerouslySetInnerHTML={{__html:value||""}}/>:
    <textarea className="fi fta" style={{border:"none",borderRadius:0,minHeight:200}} value={value||""} onChange={e=>onChange?.(e.target.value)}/>}
    <div className="editor-tabs">
      <button type="button" className={`editor-tab ${tab==="design"?"active":""}`} onClick={()=>setTab("design")}>Design</button>
      <button type="button" className={`editor-tab ${tab==="html"?"active":""}`} onClick={()=>setTab("html")}>HTML</button>
    </div>
  </div>);
}

/* ═══ RECIPIENT INPUT ═══ */
function RecipientInput({users,selected,onAdd,onRemove}){
  const[q,sQ]=useState("");const[show,sShow]=useState(false);const ref=useRef();
  const filtered=users.filter(u=>u.Username?.toLowerCase().includes(q.toLowerCase())&&!selected.includes(u.Username));
  return(<div className="recip-wrap">
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:selected.length?6:0}}>
      {selected.map(s=><span key={s} className="recip-tag">{s}<button onClick={()=>onRemove(s)}>×</button></span>)}
    </div>
    <input ref={ref} className="fi" placeholder="พิมพ์ชื่อผู้รับ..." value={q} onChange={e=>{sQ(e.target.value);sShow(true)}} onFocus={()=>sShow(true)} onBlur={()=>setTimeout(()=>sShow(false),200)}/>
    {show&&q&&filtered.length>0&&<div className="recip-dd">
      {filtered.map(u=><div key={u.Username} className="recip-opt" onMouseDown={e=>{e.preventDefault();onAdd(u.Username);sQ("");sShow(false)}}>
        <div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700}}>{u.Username[0].toUpperCase()}</div>
        <div><div style={{fontSize:13,fontWeight:500}}>{u.Username}</div><div style={{fontSize:11,color:"var(--t3)"}}>{u.Role}</div></div>
      </div>)}
    </div>}
  </div>);
}

/* ═══ CREATE WIZARD ═══ */
function CreateWizard({user,users,onClose,onCreated,showToast}){
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({
    docTypes:["หนังสือภายใน"],urgency:"ปกติ",confidentiality:"ปกติ",trackDoc:false,refCode:"",keywords:"",year:"2569",
    department:"โรงเรียนป่าก้าง",docNumber:"",docDay:"",docMonth:"",docYear:"2569",subject:"",to:"",reference:"",
    content:"",footer:"",
    files:[],
    recipients:[],purpose:"เพื่อทราบ",message:"",
  });
  const[saving,setSaving]=useState(false);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleType=(t)=>upd("docTypes",form.docTypes.includes(t)?form.docTypes.filter(x=>x!==t):[...form.docTypes,t]);

  const steps=["ตั้งค่า","กรอกรายละเอียด","กระบวนการตรวจสอบ/สั่งการ","เสร็จสิ้น ส่งถึงผู้รับ"];

  const canNext=()=>{
    if(step===0)return form.docTypes.length>0;
    if(step===1)return form.subject.trim().length>0;
    return true;
  };

  const handleSave=async()=>{
    setSaving(true);
    try{
      const now=new Date();
      const thDate=`${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()+543}`;
      await apiCall({
        action:"createDocument",id:Date.now(),status:"ส่งต่อ",docNumber:form.docNumber,
        subject:form.subject,sender:user.username,date:thDate,
        purpose:form.purpose,urgency:form.urgency,
        to:form.recipients.join(","),content:form.content,type:form.docTypes.join(","),
      });
      showToast("สร้างและส่งหนังสือสำเร็จ");
      onCreated();
    }catch{showToast("เกิดข้อผิดพลาด","err")}
    setSaving(false);
  };

  const handleDrop=(e)=>{e.preventDefault();const f=[...e.dataTransfer.files];upd("files",[...form.files,...f.map(x=>({name:x.name,size:x.size}))])};

  const refId=`${Math.random().toString(36).substr(2,6).toUpperCase()}-${Math.random().toString(36).substr(2,3).toUpperCase()}-287`;

  return(<div className="wiz">
    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <button className="detbk" onClick={onClose}>{I.back}</button>
      <div><div style={{fontSize:18,fontWeight:700}}>สร้างหนังสือ — หนังสือภายใน</div><div style={{fontSize:12,color:"var(--t3)"}}>รหัสอ้างอิง {refId}</div></div>
    </div>

    {/* Steps */}
    <div className="wiz-steps">
      {steps.map((s,i)=><>
        <div key={i} className={`wiz-step ${i===step?"active":""} ${i<step?"done":""}`} onClick={()=>{if(i<step)setStep(i)}}>
          <div className="wiz-step-num">{i<step?"✓":i+1}</div>{s}
        </div>
        {i<steps.length-1&&<span key={`s${i}`} className="wiz-sep">{I.chevR}</span>}
      </>)}
    </div>

    {/* Step 0: Settings */}
    {step===0&&<div className="wiz-card" key="s0">
      <div className="wiz-title">ตั้งค่าหนังสือ</div>
      <div className="wiz-row">
        <div className="fg full">
          <label>แบบหนังสือที่ใช้งาน *</label>
          {["หนังสือภายใน","แบบหนังสือบันทึกเสนองาน","แบบหนังสือนำส่ง"].map(t=>
            <label key={t} className="fchk"><input type="checkbox" checked={form.docTypes.includes(t)} onChange={()=>toggleType(t)}/>{t}</label>
          )}
        </div>
        <div className="fg">
          <label>ชั้นความเร็ว</label>
          <select className="fi" value={form.urgency} onChange={e=>upd("urgency",e.target.value)}>
            <option>ปกติ</option><option>ด่วน</option><option>ด่วนมาก</option><option>ด่วนที่สุด</option>
          </select>
        </div>
        <div className="fg">
          <label>ชั้นความลับ</label>
          <select className="fi" value={form.confidentiality} onChange={e=>upd("confidentiality",e.target.value)}>
            <option>ปกติ</option><option>ลับ</option><option>ลับมาก</option><option>ลับมากที่สุด</option>
          </select>
        </div>
        <div className="fg full">
          <label className="fchk"><input type="checkbox" checked={form.trackDoc} onChange={e=>upd("trackDoc",e.target.checked)}/>ติดตามเอกสาร</label>
        </div>
        <div className="fg full">
          <label>รหัสอ้างอิงเอกสารก่อนหน้า (ถ้ามี)</label>
          <div style={{display:"flex",gap:8}}>
            <input className="fi" placeholder="ระบุรหัสอ้างอิง" value={form.refCode} onChange={e=>upd("refCode",e.target.value)} style={{flex:1}}/>
            <button className="ba" type="button" style={{whiteSpace:"nowrap"}}>ตรวจสอบ</button>
          </div>
          <div style={{fontSize:11,color:"var(--t3)",marginTop:4}}>ระบุรหัสอ้างอิงที่ออกจากระบบ ใช้ในการคลิกเพื่อเปิดดูรายละเอียดเอกสาร</div>
        </div>
        <div className="fg full">
          <label>คำช่วยในการค้นหา หรือ Keyword (ถ้ามี)</label>
          <textarea className="fi" rows={3} placeholder="คีย์เวิร์ด หากมีหลายคำให้เว้นคำด้วยช่องว่าง (space) เช่น KM อบรม" value={form.keywords} onChange={e=>upd("keywords",e.target.value)}/>
        </div>
        <div className="fg">
          <label>เอกสารนี้ ต้องการออกเลขของปี พ.ศ.</label>
          <select className="fi" value={form.year} onChange={e=>upd("year",e.target.value)}>
            <option>2569</option><option>2568</option><option>2567</option>
          </select>
        </div>
      </div>
    </div>}

    {/* Step 1: Fill details */}
    {step===1&&<div className="wiz-card" key="s1">
      <div className="wiz-title">กรอกรายละเอียดหนังสือ</div>
      <div style={{fontSize:13,fontWeight:600,color:"var(--p)",marginBottom:16,padding:"10px 14px",background:"var(--ps)",borderRadius:8}}>ส่วนหัวของหนังสือ — บันทึกข้อความ</div>
      <div className="wiz-row">
        <div className="fg">
          <label>ส่วนงาน</label>
          <input className="fi" value={form.department} onChange={e=>upd("department",e.target.value)}/>
        </div>
        <div className="fg">
          <label>ที่ (เลขที่หนังสือ)</label>
          <input className="fi" placeholder="เช่น อว 8392(14)595" value={form.docNumber} onChange={e=>upd("docNumber",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>เอกสารลงวันที่</label>
          <div style={{display:"flex",gap:8}}>
            <select className="fi" value={form.docDay} onChange={e=>upd("docDay",e.target.value)}>
              <option value="">วัน</option>{Array.from({length:31},(_,i)=><option key={i} value={i+1}>{i+1}</option>)}
            </select>
            <select className="fi" value={form.docMonth} onChange={e=>upd("docMonth",e.target.value)}>
              <option value="">เดือน</option>{["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"].map((m,i)=><option key={i} value={m}>{m}</option>)}
            </select>
            <select className="fi" value={form.docYear} onChange={e=>upd("docYear",e.target.value)}>
              <option>2569</option><option>2568</option><option>2567</option>
            </select>
          </div>
        </div>
        <div className="fg full">
          <label>เรื่อง *</label>
          <textarea className="fi" rows={2} placeholder="ระบุหัวข้อเรื่อง" value={form.subject} onChange={e=>upd("subject",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>เรียน</label>
          <textarea className="fi" rows={2} placeholder="ระบุผู้รับ" value={form.to} onChange={e=>upd("to",e.target.value)}/>
        </div>
        <div className="fg full">
          <label>อ้างถึง (ถ้ามี)</label>
          <input className="fi" placeholder="อ้างถึงเอกสารฉบับก่อนหน้า" value={form.reference} onChange={e=>upd("reference",e.target.value)}/>
        </div>
      </div>

      <div style={{fontSize:13,fontWeight:600,color:"var(--p)",margin:"20px 0 12px",padding:"10px 14px",background:"var(--ps)",borderRadius:8}}>ส่วนเนื้อหา</div>
      <div className="fg full">
        <RichEditor value={form.content} onChange={v=>upd("content",v)} placeholder="ระบุรายละเอียดเนื้อหาหนังสือ"/>
      </div>

      <div style={{fontSize:13,fontWeight:600,color:"var(--p)",margin:"20px 0 12px",padding:"10px 14px",background:"var(--ps)",borderRadius:8}}>ส่วนท้ายของหนังสือ (ถ้ามี)</div>
      <div className="fg full">
        <RichEditor value={form.footer} onChange={v=>upd("footer",v)} placeholder="หมายเหตุท้ายเอกสาร (ถ้ามี)"/>
      </div>

      <div style={{fontSize:13,fontWeight:600,color:"var(--p)",margin:"20px 0 12px",padding:"10px 14px",background:"var(--ps)",borderRadius:8}}>ไฟล์แนบ (ถ้ามี)</div>
      <div className="dropzone" onDragOver={e=>e.preventDefault()} onDrop={handleDrop} onClick={()=>{}}>
        <div style={{marginBottom:8}}>{I.upload}</div>
        <div style={{fontSize:14,fontWeight:500}}>ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือกไฟล์</div>
        <div style={{fontSize:12,marginTop:4}}>รองรับไฟล์ .pdf, .jpg, .jpeg, .png, .doc, .docx, .xls, .xlsx</div>
      </div>
      {form.files.length>0&&<div className="file-list">
        {form.files.map((f,i)=><div key={i} className="file-item">{I.file}<span style={{flex:1}}>{f.name}</span><span style={{fontSize:11,color:"var(--t3)"}}>{(f.size/1024).toFixed(0)} KB</span><button onClick={()=>upd("files",form.files.filter((_,j)=>j!==i))}>{I.trash}</button></div>)}
      </div>}
    </div>}

    {/* Step 2: Review */}
    {step===2&&<div className="wiz-card" key="s2">
      <div className="wiz-title">กระบวนการตรวจสอบ / สั่งการ / ลงนาม</div>
      <div style={{background:"#f8fafc",border:"1px solid var(--bd)",borderRadius:8,padding:16}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>แบบหนังสือที่ใช้งาน</div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
          {form.docTypes.map(t=><span key={t} className="bg bg-s">{t}</span>)}
          <span style={{fontSize:12,color:"var(--t3)"}}>ชั้นความเร็ว: {form.urgency} | ชั้นความลับ: {form.confidentiality}</span>
        </div>
        <table className="dt"><thead><tr><th>ลำดับ</th><th>เรื่อง</th><th>การจัดการ</th></tr></thead>
          <tbody><tr><td>1</td><td><div className="ds">{form.subject||"(ไม่มีชื่อเรื่อง)"} — {form.docTypes[0]}</div><div className="dm">{form.department}</div></td>
          <td><button className="ba" style={{fontSize:11}}>+ กำหนดผู้ตรวจสอบ/สั่งการ/ลงนาม</button></td></tr></tbody>
        </table>
      </div>
      <div style={{marginTop:16,padding:14,background:"var(--as)",borderRadius:8,fontSize:13,color:"#92400e"}}>
        ℹ กดปุ่ม "กำหนดผู้ตรวจสอบ/สั่งการ/ลงนาม" เพื่อเพิ่มผู้ตรวจสอบ หรือข้ามไปขั้นตอนถัดไปได้เลย
      </div>
    </div>}

    {/* Step 3: Send to recipients */}
    {step===3&&<div className="wiz-card" key="s3">
      <div className="wiz-title">เสร็จสิ้น — ส่งถึงผู้รับ</div>
      <div className="wiz-row">
        <div className="fg full">
          <label>ผู้รับรายบุคคล</label>
          <RecipientInput users={users} selected={form.recipients} onAdd={u=>upd("recipients",[...form.recipients,u])} onRemove={u=>upd("recipients",form.recipients.filter(x=>x!==u))}/>
        </div>
        <div className="fg">
          <label>วัตถุประสงค์</label>
          <select className="fi" value={form.purpose} onChange={e=>upd("purpose",e.target.value)}>
            <option>เพื่อทราบ</option><option>เพื่อทราบและถือปฏิบัติ</option><option>เพื่อพิจารณา</option><option>เพื่อพิจารณาเสนอ</option><option>เพื่ออนุมัติ</option><option>เพื่ออนุญาต</option><option>เพื่อดำเนินการต่อ</option><option>เพื่อพิจารณาและส่งต่อ</option>
          </select>
        </div>
        <div className="fg full">
          <label>ข้อความ (ถ้ามี)</label>
          <RichEditor value={form.message} onChange={v=>upd("message",v)} placeholder="ข้อความเพิ่มเติมถึงผู้รับ"/>
        </div>
      </div>
      <div style={{background:"var(--os)",borderRadius:8,padding:14,fontSize:13,color:"#065f46",marginTop:8}}>
        ✓ รายการผู้รับที่เลือก: {form.recipients.length>0?form.recipients.join(", "):"ยังไม่ได้เลือกผู้รับ"} | จำนวน {form.recipients.length} รายการ
      </div>
    </div>}

    {/* Footer nav */}
    <div className="wiz-foot">
      <div className="wiz-foot-l">
        {step>0&&<button className="ba" onClick={()=>setStep(step-1)}>{I.back} ย้อนกลับ</button>}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="ba" onClick={onClose}>ยกเลิก</button>
        {step<3?<button className="bn" disabled={!canNext()} onClick={()=>setStep(step+1)}>ขั้นตอนถัดไป {I.chevR}</button>
        :<><button className="ba bl" onClick={handleSave} disabled={saving}>{saving?"กำลังส่ง...":"ส่งหนังสือตามลำดับ"}</button>
          <button className="bn" onClick={handleSave} disabled={saving}>{saving?"กำลังส่ง...":"ส่งหนังสือทุกท่าน"}</button></>}
      </div>
    </div>
  </div>);
}

/* ═══ SIDEBAR ═══ */
function SB({pg,nav,user,onLogout,cnt,isA}){
  return(<>
    <div className="sbh"><div className="sbl"><div className="sblb">eD</div><div><div className="sblt">e-Document</div><div className="sbls">ระบบสารบรรณอิเล็กทรอนิกส์</div></div></div></div>
    <nav className="sbn"><div className="sbsc"><div className="sbst">เอกสาร</div>
      <div className={`sbi ${pg==="inbox"?"on":""}`} onClick={()=>nav("inbox")}>{I.inbox} เอกสารเข้า {cnt>0&&<span className="sbbg">{cnt}</span>}</div>
      <div className={`sbi ${pg==="outbox"?"on":""}`} onClick={()=>nav("outbox")}>{I.send} เอกสารส่งออก</div>
      <div className={`sbi ${pg==="draft"?"on":""}`} onClick={()=>nav("draft")}>{I.edit} เอกสารร่าง</div>
      <div className={`sbi ${pg==="create"?"on":""}`} onClick={()=>nav("create")}>{I.file} สร้างหนังสือ</div>
    </div><div className="sbsc"><div className="sbst">จัดการ</div>
      <div className={`sbi ${pg==="archive"?"on":""}`} onClick={()=>nav("archive")}>{I.folder} แฟ้มเอกสาร</div>
      <div className={`sbi ${pg==="search"?"on":""}`} onClick={()=>nav("search")}>{I.search} ค้นหาเอกสาร</div>
      <div className={`sbi ${pg==="stats"?"on":""}`} onClick={()=>nav("stats")}>{I.chart} รายงานสถิติ</div>
    </div></nav>
    <div className="sbf"><div className="sbu"><div className="sbav">{(user.username||"?")[0].toUpperCase()}</div><div style={{flex:1,minWidth:0}}><div className="sbun">{user.username}</div><div className="sbur">{user.role}</div></div><button className="sblo" onClick={onLogout}>{I.logout}</button></div></div>
  </>);
}

/* ═══ MAIN ═══ */
function App(){
  const[cu,sCu]=useState(()=>{
    const s=sessionStorage.getItem("edoc_user");
    if(!s){window.location.href="index.html";return null}
    try{return JSON.parse(s)}catch{window.location.href="index.html";return null}
  });const[pg,sPg]=useState("inbox");const[docs,sDocs]=useState([]);const[users,sUsers]=useState([]);
  const[ld,sLd]=useState(false);const[sel,sSel]=useState(null);const[sbO,sSbO]=useState(false);
  const[toast,sToast]=useState(null);const[sq,sSq]=useState("");const[flt,sFlt]=useState("all");
  const tt=(m,t="ok")=>{sToast({m,t});setTimeout(()=>sToast(null),3500)};

  const fetchD=useCallback(async()=>{if(!cu)return;sLd(true);
    try{const r=await apiCall({action:"getDocuments",username:cu.username});if(r?.success&&Array.isArray(r.data))sDocs(r.data);else if(Array.isArray(r))sDocs(r)}catch{}sLd(false)},[cu]);
  const fetchU=useCallback(async()=>{if(!cu)return;
    try{const r=await apiCall({action:"getUsers"});if(r?.success&&Array.isArray(r.data))sUsers(r.data);else if(Array.isArray(r))sUsers(r)}catch{}},[cu]);

  useEffect(()=>{fetchD();fetchU()},[fetchD,fetchU]);

  const ack=async d=>{try{await apiCall({action:"acknowledge",id:d.ID,username:cu.username,timestamp:new Date().toLocaleString("th-TH")});tt("รับทราบแล้ว");fetchD();sSel(null)}catch{tt("เกิดข้อผิดพลาด","err")}};

  if(!cu){window.location.href="index.html";return null;}

  const isA=cu.role==="สารบัญ";
  const ic=docs.filter(d=>d.Status==="ส่งต่อ").length;
  const fD=docs.filter(d=>{const q=sq.toLowerCase();const mq=!q||(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q);if(flt==="unread")return mq&&d.Status==="ส่งต่อ";if(flt==="ack")return mq&&d.Status==="รับทราบ";return mq});
  const nav=p=>{sPg(p);sSel(null);sSbO(false)};
  const titles={inbox:"เอกสารเข้าใหม่",outbox:"เอกสารส่งออก",draft:"เอกสารร่าง",archive:"แฟ้มเอกสาร",search:"ค้นหาเอกสาร",stats:"รายงานสถิติ",create:"สร้างหนังสือ"};

  /* DETAIL */
  if(sel)return(<div className="app"><style>{CSS}</style>
    {sbO&&<div className="sov" onClick={()=>sSbO(false)}/>}
    <aside className={`sb ${sbO?"open":""}`}><SB pg={pg} nav={nav} user={cu} onLogout={()=>{sessionStorage.removeItem("edoc_user");window.location.href="index.html"}} cnt={ic} isA={isA}/></aside>
    <main className="mn"><div className="top"><button className="tmn" onClick={()=>sSbO(!sbO)}>{I.menu}</button><span className="ttl">รายละเอียด</span></div>
    <div className="cnt"><div className="det">
      <div className="deth"><button className="detbk" onClick={()=>sSel(null)}>{I.back}</button><div style={{flex:1}}><h2 style={{fontSize:17,fontWeight:700,lineHeight:1.4}}>{sel.Subject}</h2><span className="dn">{sel.DocNumber||"-"}</span></div></div>
      <div className="detc"><div className="detp">
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}><SBadge s={sel.Status}/><span style={{fontSize:12,color:"var(--t3)"}}>ID: {sel.ID}</span></div>
        <div className="detg">
          <div><div className="detfl">เลขที่หนังสือ</div><div className="detfp">{sel.DocNumber||"-"}</div></div>
          <div><div className="detfl">ผู้ส่ง</div><div className="detfp">{sel.Sender}</div></div>
          <div><div className="detfl">วันที่</div><div className="detfp">{sel.Date}</div></div>
          <div><div className="detfl">วัตถุประสงค์</div><div className="detfp">{sel.Purpose||"-"}</div></div>
          <div className="full"><div className="detfl">รับทราบโดย</div><div className="detfp" style={{color:sel.ReadBy?"var(--ok)":"var(--t3)"}}>{sel.ReadBy||"ยังไม่มี"}</div></div>
        </div></div>
        <div className="detb">
          <div className="detfl" style={{marginBottom:8}}>เนื้อหา</div>
          <div className="detcn">{sel.Content||<span style={{color:"var(--t3)"}}>ไม่มีเนื้อหาเพิ่มเติม</span>}</div>
          <div className="deta">
            {sel.Status==="ส่งต่อ"&&<button className="ba gr" onClick={()=>ack(sel)}>{I.check} กดรับทราบ</button>}
            <button className="ba bl" onClick={()=>tt("ส่งต่อแล้ว")}>{I.forward} ส่งต่อ</button>
            <button className="ba" onClick={()=>tt("เก็บเข้าแฟ้มแล้ว")}>{I.archive} เก็บเข้าแฟ้ม</button>
          </div></div>
        <div className="trk"><div className="detfl" style={{marginBottom:10}}>ลำดับการรับ-ส่ง</div>
          {(sel.ReadBy||"").split(",").filter(Boolean).map((e,i,a)=><div className="trki" key={i}><div style={{position:"relative"}}><div className="trkd" style={{background:i===0?"var(--p)":"var(--bd)"}}/>{i<a.length-1&&<div className="trkl"/>}</div><div style={{fontSize:13,fontWeight:600}}>{e.trim()}</div></div>)}
          {!sel.ReadBy&&<div style={{fontSize:13,color:"var(--t3)"}}>ยังไม่มีรายการ</div>}
        </div>
      </div></div></div></main>
    {toast&&<div className={`toast toast-${toast.t}`}>{toast.t==="ok"?I.check:"⚠"} {toast.m}</div>}
  </div>);

  /* CREATE PAGE */
  if(pg==="create")return(<div className="app"><style>{CSS}</style>
    {sbO&&<div className="sov" onClick={()=>sSbO(false)}/>}
    <aside className={`sb ${sbO?"open":""}`}><SB pg={pg} nav={nav} user={cu} onLogout={()=>{sessionStorage.removeItem("edoc_user");window.location.href="index.html"}} cnt={ic} isA={isA}/></aside>
    <main className="mn"><div className="top"><button className="tmn" onClick={()=>sSbO(!sbO)}>{I.menu}</button><span className="ttl">สร้างหนังสือ</span></div>
    <div className="cnt"><CreateWizard user={cu} users={users} onClose={()=>sPg("inbox")} onCreated={()=>{sPg("inbox");fetchD()}} showToast={tt}/></div></main>
    {toast&&<div className={`toast toast-${toast.t}`}>{toast.t==="ok"?I.check:"⚠"} {toast.m}</div>}
  </div>);

  /* MAIN */
  return(<div className="app"><style>{CSS}</style>
    {sbO&&<div className="sov" onClick={()=>sSbO(false)}/>}
    <aside className={`sb ${sbO?"open":""}`}><SB pg={pg} nav={nav} user={cu} onLogout={()=>{sessionStorage.removeItem("edoc_user");window.location.href="index.html"}} cnt={ic} isA={isA}/></aside>
    <main className="mn"><div className="top"><button className="tmn" onClick={()=>sSbO(!sbO)}>{I.menu}</button><span className="ttl">{titles[pg]}</span>
      <div className="tac"><button className="rfb" onClick={fetchD}>{I.refresh}</button><button className="tbt">{I.bell}{ic>0&&<span className="tdt"/>}</button></div></div>
    <div className="cnt">
      <div className="sts">
        <div className="st" onClick={()=>sPg("inbox")}><div className="stic" style={{background:"var(--ps)",color:"var(--p)"}}>{I.inbox}</div><div className="stv">{docs.length}</div><div className="stl">เอกสารทั้งหมด</div></div>
        <div className="st"><div className="stic" style={{background:"var(--as)",color:"var(--ac)"}}>{I.clock}</div><div className="stv">{docs.filter(d=>d.Status==="ส่งต่อ").length}</div><div className="stl">รอดำเนินการ</div></div>
        <div className="st"><div className="stic" style={{background:"var(--os)",color:"var(--ok)"}}>{I.check}</div><div className="stv">{docs.filter(d=>d.Status==="รับทราบ").length}</div><div className="stl">รับทราบแล้ว</div></div>
        <div className="st" onClick={()=>sPg("create")}><div className="stic" style={{background:"#ede9fe",color:"#7c3aed"}}>{I.plus}</div><div className="stv" style={{fontSize:16,marginTop:6}}>สร้างหนังสือ</div><div className="stl">คลิกเพื่อสร้าง</div></div>
      </div>

      {pg==="inbox"&&<div className="tc"><div className="tch"><div className="tcl"><span className="tct">เอกสารเข้า</span><div className="flt">
        <button className={`fb ${flt==="all"?"on":""}`} onClick={()=>sFlt("all")}>ทั้งหมด</button>
        <button className={`fb ${flt==="unread"?"on":""}`} onClick={()=>sFlt("unread")}>รอดำเนินการ</button>
        <button className={`fb ${flt==="ack"?"on":""}`} onClick={()=>sFlt("ack")}>รับทราบแล้ว</button>
      </div></div><div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}><div className="sbx">{I.search}<input placeholder="ค้นหา..." value={sq} onChange={e=>sSq(e.target.value)}/></div><button className="bn" onClick={()=>sPg("create")}>{I.plus} สร้างหนังสือ</button></div></div>
        {ld?<div className="ldr"><div className="ldrs"/>กำลังโหลด...</div>:
        fD.length>0?<div style={{overflowX:"auto"}}><table className="dt"><thead><tr><th style={{width:90}}>สถานะ</th><th style={{width:140}}>เลขที่</th><th>เรื่อง</th><th style={{width:130}}>ผู้ส่ง</th><th style={{width:110}}>วันที่</th><th style={{width:80}}>วัตถุประสงค์</th></tr></thead>
        <tbody>{fD.map((d,i)=><tr key={d.ID||i} onClick={()=>sSel(d)}><td><SBadge s={d.Status}/></td><td><span className="dn">{d.DocNumber||"-"}</span></td><td><div className="ds">{d.Subject}</div>{d.ReadBy&&<div className="dm">{I.check} {d.ReadBy.substring(0,50)}</div>}</td><td style={{fontSize:12}}>{d.Sender}</td><td><span className="dm">{I.clock} {d.Date}</span></td><td style={{fontSize:12}}>{d.Purpose}</td></tr>)}</tbody></table></div>:
        <div className="emp"><div className="emp-i">📭</div><div className="emp-t">{sq?"ไม่พบเอกสาร":"ไม่มีเอกสาร"}</div></div>}
      </div>}

      {pg==="outbox"&&<div className="tc"><div className="tch"><span className="tct">เอกสารส่ง</span><button className="bn" onClick={()=>sPg("create")}>{I.plus} สร้าง</button></div>
        {docs.filter(d=>d.Sender===cu.username).length>0?<div style={{overflowX:"auto"}}><table className="dt"><thead><tr><th>เลขที่</th><th>เรื่อง</th><th>วันที่</th><th>สถานะ</th></tr></thead><tbody>
        {docs.filter(d=>d.Sender===cu.username).map((d,i)=><tr key={i} onClick={()=>sSel(d)}><td><span className="dn">{d.DocNumber||"-"}</span></td><td><div className="ds">{d.Subject}</div></td><td style={{fontSize:12}}>{d.Date}</td><td><SBadge s={d.Status}/></td></tr>)}</tbody></table></div>:
        <div className="emp"><div className="emp-i">📤</div><div className="emp-t">ยังไม่มี</div></div>}</div>}

      {pg==="search"&&<div className="tc"><div style={{padding:20}}><div className="sbx" style={{maxWidth:"100%",minWidth:"auto"}}>{I.search}<input placeholder="ค้นหาเลขที่, เรื่อง, ผู้ส่ง..." value={sq} onChange={e=>sSq(e.target.value)} style={{fontSize:15}}/></div></div>
        {sq.trim()?<div style={{overflowX:"auto"}}><table className="dt"><thead><tr><th>เลขที่</th><th>เรื่อง</th><th>ผู้ส่ง</th><th>วันที่</th><th>สถานะ</th></tr></thead><tbody>
        {docs.filter(d=>{const q=sq.toLowerCase();return(d.Subject||"").toLowerCase().includes(q)||(d.DocNumber||"").toLowerCase().includes(q)||(d.Sender||"").toLowerCase().includes(q)}).map((d,i)=><tr key={i} onClick={()=>sSel(d)}><td><span className="dn">{d.DocNumber||"-"}</span></td><td><div className="ds">{d.Subject}</div></td><td style={{fontSize:12}}>{d.Sender}</td><td style={{fontSize:12}}>{d.Date}</td><td><SBadge s={d.Status}/></td></tr>)}</tbody></table></div>:
        <div className="emp"><div className="emp-i">🔍</div><div className="emp-t">พิมพ์คำค้นหา</div></div>}</div>}

      {pg==="stats"&&<div className="tc"><div className="tch"><span className="tct">สรุปสถิติ</span></div><div style={{padding:22}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12}}>
          {[{l:"ทั้งหมด",v:docs.length,bg:"var(--ps)",c:"var(--p)"},{l:"รอดำเนินการ",v:docs.filter(d=>d.Status==="ส่งต่อ").length,bg:"var(--as)",c:"#d97706"},{l:"รับทราบ",v:docs.filter(d=>d.Status==="รับทราบ").length,bg:"var(--os)",c:"#059669"}].map((s,i)=>
          <div key={i} style={{background:s.bg,borderRadius:12,padding:18,textAlign:"center"}}><div style={{fontSize:32,fontWeight:700,color:s.c,fontFamily:"DM Sans"}}>{s.v}</div><div style={{fontSize:12,color:"var(--t2)",marginTop:3}}>{s.l}</div></div>)}</div></div></div>}

      {(pg==="draft"||pg==="archive")&&<div className="tc"><div className="tch"><span className="tct">{titles[pg]}</span></div><div className="emp"><div className="emp-i">{pg==="draft"?"📝":"📁"}</div><div className="emp-t">ไม่มีรายการ</div></div></div>}
    </div></main>
    {toast&&<div className={`toast toast-${toast.t}`}>{toast.t==="ok"?I.check:"⚠"} {toast.m}</div>}
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
