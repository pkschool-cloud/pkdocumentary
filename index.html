<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — ระบบจัดการเอกสารอิเล็กทรอนิกส์</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--f:'IBM Plex Sans Thai','DM Sans',sans-serif;--p:#3b82f6;--ph:#2563eb;--dn:#ef4444;--t:#1a2332;--t2:#5a6a7e;--t3:#94a3b8;--bd:#e5e9f0}
body{height:100vh;font-family:var(--f);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0c1222,#1e3a5f,#0c1222);background-size:200% 200%;animation:grad 12s ease infinite;overflow:hidden;position:relative}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
body::before{content:'';position:absolute;top:-40%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%);border-radius:50%;pointer-events:none}
body::after{content:'';position:absolute;bottom:-30%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(245,158,11,.1),transparent 70%);border-radius:50%;pointer-events:none}

.card{width:440px;max-width:92vw;background:rgba(255,255,255,.97);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.15);padding:48px 40px 40px;position:relative;z-index:2;animation:fadeUp .6s ease;backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:12px}
.logo-box{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(59,130,246,.35);animation:float 4s ease-in-out infinite; background:#fff; overflow: hidden; border: 3px solid #fff;}
.logo-box img {width: 100%; height: 100%; object-fit: cover;}
.logo h1{font-size:26px;font-weight:700;color:var(--t);font-family:'DM Sans';letter-spacing:-.5px}
.logo p{font-size:13px;color:var(--t2);margin-top:2px}
.subtitle{text-align:center;color:var(--t3);font-size:14px;margin-bottom:32px}

.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:7px}
.input-wrap{display:flex;align-items:center;border:1.5px solid var(--bd);border-radius:10px;background:#f8fafc;transition:all .25s;overflow:hidden}
.input-wrap:focus-within{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.input-wrap.err{border-color:var(--dn);animation:shake .4s ease}
.input-wrap.err:focus-within{box-shadow:0 0 0 3px rgba(239,68,68,.12)}
.input-icon{padding:0 14px;color:var(--t3);display:flex;flex-shrink:0}
.input-icon svg{width:20px;height:20px}
.input-field{flex:1;border:none;background:none;padding:13px 0;font-size:15px;font-family:var(--f);outline:none;color:var(--t);min-width:0}
.input-field::placeholder{color:var(--t3)}
.eye-btn{padding:0 14px;background:none;border:none;cursor:pointer;color:var(--t3);display:flex;transition:color .2s}
.eye-btn:hover{color:var(--t2)}
.eye-btn svg{width:20px;height:20px}

.error-msg{font-size:12px;color:var(--dn);margin-top:8px;display:none;align-items:center;gap:4px}
.error-msg.show{display:flex}

.login-btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:var(--f);cursor:pointer;transition:all .25s;margin-top:8px;background:linear-gradient(135deg,var(--p),#1d4ed8);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.3);position:relative;overflow:hidden}
.login-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.4)}
.login-btn:active:not(:disabled){transform:translateY(0)}
.login-btn:disabled{opacity:.7;cursor:wait}
.login-btn .spinner{display:none;width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
.login-btn.loading .spinner{display:inline-block}
.login-btn.loading .btn-text{opacity:.8}

.footer{text-align:center;margin-top:28px;font-size:12px;color:var(--t3)}
@media(max-width:480px){.card{padding:36px 24px 28px}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-box">
      <img src="school logo.jpg" alt="Logo" onerror="this.style.display='none'">
    </div>
    <div>
      <h1>CMU e-Document</h1>
      <p>โรงเรียนป่าก้าง</p>
    </div>
  </div>
  <div class="subtitle">ระบบจัดการเอกสารอิเล็กทรอนิกส์</div>

  <form id="loginForm" onsubmit="return handleLogin(event)">
    <div class="field">
      <label for="username">ชื่อผู้ใช้งาน</label>
      <div class="input-wrap" id="userWrap">
        <span class="input-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input class="input-field" id="username" type="text" placeholder="Username" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label for="password">รหัสผ่าน</label>
      <div class="input-wrap" id="passWrap">
        <span class="input-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
        <input class="input-field" id="password" type="password" placeholder="Password" autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePassword()">
          <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg">⚠ <span id="errorText"></span></div>

    <button class="login-btn" type="submit" id="loginBtn">
      <span class="spinner"></span>
      <span class="btn-text">เข้าสู่ระบบ</span>
    </button>
  </form>

  <div class="footer">ระบบสารบรรณอิเล็กทรอนิกส์</div>
</div>

<script>
// ★ อัปเดตลิงก์ API ล่าสุดแล้ว ★
const API = "https://script.google.com/macros/s/AKfycbws4srbuR78gxskQJoTzWnnDQMDqjYVA3vz3Lt-6AVEU0yocqitiwlprCwu49lEOrc/exec";

if (sessionStorage.getItem("edoc_user")) {
  window.location.href = "dashboard.html";
}

function togglePassword() {
  const inp = document.getElementById("password");
  const icon = document.getElementById("eyeIcon");
  if (inp.type === "password") {
    inp.type = "text";
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = "password";
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function showError(msg) {
  const el = document.getElementById("errorMsg");
  document.getElementById("errorText").textContent = msg;
  el.classList.add("show");
  document.getElementById("userWrap").classList.add("err");
  document.getElementById("passWrap").classList.add("err");
  setTimeout(() => {
    document.getElementById("userWrap").classList.remove("err");
    document.getElementById("passWrap").classList.remove("err");
  }, 400);
}

function clearError() {
  document.getElementById("errorMsg").classList.remove("show");
  document.getElementById("userWrap").classList.remove("err");
  document.getElementById("passWrap").classList.remove("err");
}

async function handleLogin(e) {
  e.preventDefault();
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!user || !pass) {
    showError("กรุณากรอกชื่อผู้ใช้และรหัสผ่าน");
    return false;
  }

  const btn = document.getElementById("loginBtn");
  btn.classList.add("loading");
  btn.disabled = true;
  clearError();

  try {
    const qs = new URLSearchParams({ action: "login", username: user, password: pass }).toString();
    let res;
    try {
      const r = await fetch(API + "?" + qs, { method: "GET", redirect: "follow" });
      res = await r.json();
    } catch {
      const r = await fetch(API, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "login", username: user, password: pass }) });
      res = await r.json();
    }

    if (res && res.success) {
      sessionStorage.setItem("edoc_user", JSON.stringify({
        username: res.name || res.username || user,
        role: res.role || "ครูทั่วไป"
      }));
      window.location.href = "dashboard.html";
    } else {
      showError(res?.error || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
    }
  } catch (err) {
    showError("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
  }

  btn.classList.remove("loading");
  btn.disabled = false;
  return false;
}

document.getElementById("username").addEventListener("input", clearError);
document.getElementById("password").addEventListener("input", clearError);
</script>
</body>
</html>
